/* ── Build sidebar chapter tree ── */
function buildChapterTree() {
  const tree = document.getElementById('chapterTree');
  tree.innerHTML = '';

  volumes.forEach((vol, i) => {
    const group = document.createElement('div');
    group.className = 'volume-group' + (i < 2 ? ' open' : '');
    group.innerHTML = `
      <div class="volume-header">
        <span class="volume-toggle">▶</span>
        <span class="volume-num">${vol.num}</span>
        <span class="volume-title">${vol.title}</span>
      </div>
      <div class="chapter-list">
        ${vol.chapters.map(ch => `
          <div class="chapter-item" data-chapter="${ch.id}">
            <span class="chapter-id">${ch.id}</span>
            <span class="chapter-name">${ch.title}</span>
          </div>
        `).join('')}
      </div>
    `;

    group.querySelector('.volume-header').addEventListener('click', () => {
      group.classList.toggle('open');
    });

    group.querySelectorAll('.chapter-item').forEach(item => {
      item.addEventListener('click', () => {
        loadChapter(item.dataset.chapter);
      });
    });

    tree.appendChild(group);
  });
}

/* ── Load a chapter ── */
function loadChapter(id) {
  currentChapterId = id;
  currentPage = 'chapter';

  // Update sidebar active state
  document.querySelectorAll('.chapter-item').forEach(el => {
    el.classList.toggle('active', el.dataset.chapter === id);
  });
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));

  // Open the volume containing this chapter
  document.querySelectorAll('.volume-group').forEach(group => {
    const items = group.querySelectorAll('.chapter-item');
    items.forEach(item => {
      if (item.dataset.chapter === id) group.classList.add('open');
    });
  });

  const chapterData = chapters[id];

  if (!chapterData) {
    renderPlaceholderChapter(id);
    return;
  }

  renderChapter(chapterData);
}

/* ── Render placeholder for chapters without content yet ── */
function renderPlaceholderChapter(id) {
  // Find title from volumes

  volumes.forEach(vol => {

  const inner = document.getElementById('contentInner');
  inner.innerHTML = `

/* ── Render full chapter ── */
function renderChapter(data) {
  const inner = document.getElementById('contentInner');

  let html = `
    <div class="page-header">
      <div class="page-breadcrumb">
        <span>百科</span><span class="breadcrumb-sep">›</span>
        <span>${data.volumeTitle}</span><span class="breadcrumb-sep">›</span>
        <span>${data.id}</span>
      </div>
      <div class="page-volume-tag">${data.volume}</div>
      <h1 class="page-title">${data.title}</h1>
      <p class="page-summary">${data.summary}</p>
    </div>
  `;

  const c = data.content;

  // A | Concept
  html += buildSection('A', '概念說明', buildConceptBody(c.concept));

  // B | System Position
  html += buildSection('B', '在整體系統中的位置', `<p>${c.systemPosition}</p>`);

  // C | Normal Flow
  html += buildSection('C', '正常資料流 / 系統關係', buildFlowBody(c.normalFlow));

  // D | Key Terms
  html += buildSection('D', '關鍵名詞', buildTermsBody(c.keyTerms));

  // E | Engineering Points
  html += buildSection('E', '工程重點', buildEngPoints(c.engineeringPoints));

  // F | Risks
  html += buildSection('F', '常見風險', buildRisks(c.risks));

  // G | Cross-module Impact
  html += buildSection('G', '跨模組影響', buildImpact(c.crossModuleImpact));

  // H | Check Questions
  html += buildSection('H', '理解檢查點', buildCheckQuestions(c.checkQuestions));

  // I | Related
  html += buildSection('I', '延伸閱讀', buildRelated(c.related));

  inner.innerHTML = html;

  // Attach toggles for sections
  inner.querySelectorAll('.section-header').forEach(header => {
    header.addEventListener('click', () => {
      header.parentElement.classList.toggle('open');
    });
  });

  // Open first 2 sections by default
  inner.querySelectorAll('.section').forEach((s, i) => {
    if (i < 2) s.classList.add('open');
  });

  // Update right panel
  updateRightPanel(data.content.related);
}

function buildSection(label, title, bodyHTML) {
  return `
    <div class="section">
      <div class="section-header">
        <div class="section-label">${label}</div>
        <div class="section-title">${title}</div>
        <div class="section-toggle">▾</div>
      </div>
      <div class="section-body">${bodyHTML}</div>
    </div>
  `;
}

function buildConceptBody(text) {
  const paras = text.trim().split('\n\n');
  return paras.map(p => `<p>${p.trim()}</p>`).join('');
}

function buildFlowBody(flow) {
  if (!flow || flow.type !== 'flow') return '<p>（資料流圖示待補充）</p>';
  const nodes = flow.nodes.map((n, i) => {
    const isFirst = i === 0;
    const arrow = i > 0 ? '<span class="flow-arrow">→</span>' : '';
    return `${arrow}<div class="flow-node${isFirst ? ' highlight' : ''}">${n}</div>`;
  }).join('');
  return `<div class="flow-diagram">${nodes}</div>`;
}

function buildTermsBody(terms) {
  if (!terms || !terms.length) return '<p>（名詞待補充）</p>';
  const cards = terms.map(t => `
    <div class="term-card">
      <div class="term-name">${t.name}</div>
      <div class="term-def">${t.definition}</div>
      <div class="term-label">工程意義</div>
      <div class="term-detail">${t.meaning}</div>
      <div class="term-label" style="margin-top:6px">為什麼需要理解</div>
      <div class="term-detail">${t.why}</div>
    </div>
  `).join('');
  return `<div class="terms-grid">${cards}</div>`;
}

function buildEngPoints(points) {
  if (!points || !points.length) return '<p>（工程重點待補充）</p>';
  const items = points.map((p, i) => `
    <div class="eng-point">
      <div class="eng-num">${String(i+1).padStart(2,'0')}</div>
      <div class="eng-text">${p}</div>
    </div>
  `).join('');
  return `<div class="eng-points">${items}</div>`;
}

function buildRisks(risks) {
  if (!risks || !risks.length) return '<p>（風險待補充）</p>';
  const cards = risks.map(r => `
    <div class="risk-card">
      <div class="risk-title">⚠ ${r.title}</div>
      <div class="risk-grid">
        <span class="risk-key">觸發條件</span><span class="risk-val">${r.trigger}</span>
        <span class="risk-key">影響範圍</span><span class="risk-val">${r.impact}</span>
        <span class="risk-key">預防方式</span><span class="risk-val">${r.prevention}</span>
      </div>
    </div>
  `).join('');
  return `<div class="risk-list">${cards}</div>`;
}

function buildImpact(impact) {
  if (!impact) return '<p>（跨模組影響待補充）</p>';
  return `
    <div class="impact-grid">
      <div class="impact-col upstream">
        <div class="impact-col-title">▲ 上游依賴</div>
        ${impact.upstream.map(i => `<div class="impact-item">${i}</div>`).join('')}
      </div>
      <div class="impact-col downstream">
        <div class="impact-col-title">▼ 下游影響</div>
        ${impact.downstream.map(i => `<div class="impact-item">${i}</div>`).join('')}
      </div>
      <div class="impact-col shared">
        <div class="impact-col-title">⇄ 共用資源</div>
        ${impact.shared.map(i => `<div class="impact-item">${i}</div>`).join('')}
      </div>
    </div>
  `;
}

function buildCheckQuestions(questions) {
  if (!questions || !questions.length) return '<p>（檢查點待補充）</p>';
  const items = questions.map(q => `
    <div class="check-item">
      <div class="check-q">?</div>
      <div class="check-text">${q}</div>
    </div>
  `).join('');
  return `<div class="check-list">${items}</div>`;
}

function buildRelated(related) {
  if (!related) return '<p>（延伸閱讀待補充）</p>';
  let html = '';

  if (related.chapters && related.chapters.length) {
    html += `<div class="home-section-title" style="margin-bottom:8px">相關章節</div>
    <div class="related-tags" style="margin-bottom:14px">
      ${related.chapters.map(id => {
        const title = getChapterTitle(id);
        return `<span class="related-tag" onclick="loadChapter('${id}')">${id} ${title}</span>`;
      }).join('')}
    </div>`;
  }

  if (related.modules && related.modules.length) {
    html += `<div class="home-section-title" style="margin-bottom:8px">相關模組</div>
    <div class="related-tags" style="margin-bottom:14px">
      ${related.modules.map(m => `<span class="related-tag">${m}</span>`).join('')}
    </div>`;
  }

  if (related.terms && related.terms.length) {
    html += `<div class="home-section-title" style="margin-bottom:8px">相關名詞</div>
    <div class="related-tags">
      ${related.terms.map(t => `<span class="related-tag">${t}</span>`).join('')}
    </div>`;
  }

  return html || '<p>（延伸閱讀待補充）</p>';
}

/* ── Update right panel ── */
function updateRightPanel(related) {
  const chapterLinks = document.getElementById('rightChapterLinks');
  const moduleTags = document.getElementById('rightModuleTags');
  const termTags = document.getElementById('rightTermTags');
  const extended = document.getElementById('rightExtended');

  if (!related || !related.chapters || !related.chapters.length) {
    chapterLinks.innerHTML = '<div style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono);">（無）</div>';
  } else {
    chapterLinks.innerHTML = related.chapters.map(id => {
      const title = getChapterTitle(id);
      return `<div class="right-link" onclick="loadChapter('${id}')">
        <span class="right-link-id">${id}</span>${title}
      </div>`;
    }).join('');
  }

  if (!related || !related.modules || !related.modules.length) {
    moduleTags.innerHTML = '<div style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono);">（無）</div>';
  } else {
    moduleTags.innerHTML = `<div style="padding-top:4px">${related.modules.map(m =>
      `<span class="right-tag">${m}</span>`).join('')}</div>`;
  }

  if (!related || !related.terms || !related.terms.length) {
    termTags.innerHTML = '<div style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono);">（無）</div>';
  } else {
    termTags.innerHTML = `<div style="padding-top:4px">${related.terms.map(t =>
      `<span class="right-tag">${t}</span>`).join('')}</div>`;
  }

  extended.innerHTML = '<div style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono);">Phase 2 補充</div>';
}

/* ═══════════════════════════════════════════════════════════
   SEARCH ENGINE
═══════════════════════════════════════════════════════════ */
function buildSearchIndex() {
  const index = [];

  // Helper: extract searchable text from chapter content
  function chapterSearchText(ch, chData) {
    let text = `${ch.id} ${ch.title}`;
    if (chData && chData.content) {
      const c = chData.content;
      if (c.concept) text += ' ' + c.concept;
      if (c.systemPosition) text += ' ' + c.systemPosition;
      if (c.keyTerms) c.keyTerms.forEach(t => { text += ' ' + t.name + ' ' + t.definition; });
      if (c.engineeringPoints) text += ' ' + c.engineeringPoints.join(' ');
    }
    return text.toLowerCase().replace(/\s+/g,' ');
  }

  function chapterSummary(ch, chData, vol) {
    if (chData && chData.summary) return chData.summary;
    return `${vol.num} · ${vol.title}`;
  }

  // Index chapters from volumes
  volumes.forEach(vol => {
    vol.chapters.forEach(ch => {
      const chData = chapters[ch.id];
      index.push({
        type: 'chapter',
        id: ch.id,
        title: `${ch.id} ${ch.title}`,
        searchText: chapterSearchText(ch, chData),
        summary: chapterSummary(ch, chData, vol),
        action: () => loadChapter(ch.id)
      });
    });
  });

  // Index modules
  modules.forEach(m => {
    index.push({
      type: 'module',
      id: m.id,
      title: m.name,
      searchText: `${m.name} ${m.definition} ${m.layer}`.toLowerCase(),
      summary: m.definition,
      action: () => openModuleDetail(m.id)
    });
  });

  // Index glossary
  glossary.forEach(g => {
    index.push({
      type: 'term',
      id: g.id,
      title: g.term,
      searchText: `${g.term} ${g.definition} ${g.category}`.toLowerCase(),
      summary: g.definition,
      action: () => openGlossaryTerm(g.id)
    });
  });

  // Index pipelines
  pipelines.forEach(p => {
    index.push({
      type: 'pipeline',
      id: p.id,
      title: p.title,
      searchText: `${p.title} ${p.description} ${p.nodes.map(n=>n.label).join(' ')}`.toLowerCase(),
      summary: p.description,
      action: () => { activePipelineId = p.id; renderPipelinePage(); }
    });
  });

  // Index core models
  coreModels.forEach(m => {
    index.push({
      type: 'model',
      id: m.id,
      title: m.title,
      searchText: `${m.title} ${m.description}`.toLowerCase(),
      summary: m.description,
      action: () => { activeCoreModelId = m.id; renderCoreModelsPage(); }
    });
    // Also index feature names
    if (m.type === 'feature-impact' && m.features) {
      m.features.forEach(f => {
        index.push({
          type: 'model',
          id: 'fi-' + f.id,
          title: f.featureName + '（功能影響）',
          searchText: `${f.featureName} feature impact 功能影響`.toLowerCase(),
          summary: f.possibleTradeoff,
          action: () => { activeCoreModelId = m.id; activeFeatureId = f.id; renderCoreModelsPage(); }
        });
      });
    }
  });

  return index;
}

let searchIndex = [];

function initSearch() {
  searchIndex = buildSearchIndex();

  const input = document.getElementById('globalSearch');
  const results = document.getElementById('searchResults');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q || q.length < 1) {
      results.classList.remove('visible');
      results.innerHTML = '';
      return;
    }

    const matches = searchIndex.filter(item => item.searchText.includes(q)).slice(0, 12);

    if (!matches.length) {
      results.innerHTML = `<div class="search-empty">找不到「${input.value}」相關結果</div>`;
    } else {
      results.innerHTML = matches.map(m => `
        <div class="search-result-item" data-id="${m.id}" data-type="${m.type}">
          <span class="result-type type-${m.type === 'chapter' ? 'chapter' : m.type === 'module' ? 'module' : m.type === 'pipeline' ? 'chapter' : m.type === 'model' ? 'module' : 'term'}">
            ${m.type === 'chapter' ? '章節' : m.type === 'module' ? '模組' : m.type === 'pipeline' ? 'Pipeline' : m.type === 'model' ? '核心模型' : '名詞'}
          </span>
          <div class="result-info">
            <div class="result-title">${m.title}</div>
            <div class="result-summary">${m.summary}</div>
          </div>
        </div>
      `).join('');

      results.querySelectorAll('.search-result-item').forEach((el, i) => {
        el.addEventListener('click', () => {
          matches[i].action();
          input.value = '';
          results.classList.remove('visible');
          results.innerHTML = '';
        });
      });
    }

    results.classList.add('visible');
  });

  // Close on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.header-search')) {
      results.classList.remove('visible');
    }
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      results.classList.remove('visible');
      input.value = '';
    }
  });
}

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
function getChapterTitle(id) {
  for (const vol of volumes) {
    for (const ch of vol.chapters) {
      if (ch.id === id) return ch.title;
    }
  }
  return id;
}

function getVolumeNum(id) {
  const prefix = id.split('.')[0];
  const vol = volumes.find(v => v.chapters.some(c => c.id.startsWith(prefix + '.')));
  return vol ? vol.num : 'VOL';
}

function openVolume(volId) {
  const group = document.querySelector(`.volume-group`);
  // Find by matching volume num
  document.querySelectorAll('.volume-group').forEach((g, i) => {
    if (volumes[i] && volumes[i].id === volId) {
      g.classList.add('open');
      // Scroll sidebar to show it
      g.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });
}

/* ═══════════════════════════════════════════════════════════
   NAV ROUTING
═══════════════════════════════════════════════════════════ */
function initNav() {
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      const page = link.dataset.page;
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      link.classList.add('active');
      document.querySelectorAll('.chapter-item').forEach(el => el.classList.remove('active'));

      if (page === 'home') {
        renderHome();
      } else if (page === 'modules') {
        renderModulesPage();
      } else if (page === 'glossary') {
        renderGlossaryPage();
      } else if (page === 'pipeline') {
        renderPipelinePage();
      } else if (page === 'models') {
        renderCoreModelsPage();
      } else {
        renderPlaceholderPage(page);
      }
    });
  });
}

          activePipelineNodeId = null;
          if (nodeDetail) nodeDetail.classList.remove('visible');
          inner.querySelectorAll('.pnode').forEach(n => n.classList.remove('active'));
          const p = pipelines.find(x => x.id === pid);
          if (p) updateRightPanel({ chapters: p.relatedChapters, modules: p.relatedModules, terms: [] });
        }
      }
    });
  });

  inner.querySelectorAll('.dp-chip.ch-chip').forEach(el => {
    el.addEventListener('click', () => loadChapter(el.dataset.ch));
  });

  updateRightPanel({ chapters: ['4.1','4.2','4.3','4.5'], modules: ['isp','npu','ddr','encoder'], terms: [] });
}

function buildPipelineCard(p) {
  const nodes = p.nodes.map(n => `
    <div class="pnode type-${n.type}" data-pid="${p.id}" data-nid="${n.id}" title="${n.role}">
      <div class="pnode-label">${n.label}</div>
      <div class="pnode-type">${n.type}</div>
    </div>
  `).join('<div class="pedge"><div class="pedge-arrow">→</div></div>');

  const bkChips = p.bottlenecks.map(b => `<span class="pbk-chip">${b}</span>`).join('');

  const relChs = p.relatedChapters.map(c =>
    `<span class="dp-chip ch-chip" data-ch="${c}" onclick="loadChapter('${c}')">${c} ${getChapterTitle(c)}</span>`
  ).join('');

  const relMods = p.relatedModules.map(mid => {
    const m = modules.find(x => x.id === mid);
    return m ? `<span class="dp-chip mod-chip-link" onclick="openModuleDetail('${mid}')">${m.name}</span>` : '';
  }).join('');

  return `
    <div class="pipeline-card" data-pid="${p.id}">
      <div class="pipeline-card-header" data-pid="${p.id}">
        <div>
          <div class="pipeline-card-title">${p.title}</div>
          <div class="pipeline-card-desc">${p.description}</div>
        </div>
        <button class="pipeline-expand-btn">概覽</button>
      </div>

      <div class="pipeline-info" data-pid="${p.id}">
        <div class="dp-body" style="padding:12px 0 0">
          <div class="dp-section dp-section-full">
            <div class="dp-section-title">主要瓶頸</div>
            <div class="pipeline-bottleneck-chips">${bkChips}</div>
          </div>
          <div class="dp-section">
            <div class="dp-section-title">相關章節</div>
            <div class="dp-chip-row">${relChs}</div>
          </div>
          <div class="dp-section">
            <div class="dp-section-title">相關模組</div>
            <div class="dp-chip-row">${relMods}</div>
          </div>
        </div>
      </div>

      <div class="pipeline-diagram">
        <div class="pipeline-flow">${nodes}</div>
      </div>

      <div class="pnode-detail" data-pid="${p.id}"></div>
    </div>
  `;
}

function renderPipelineNodeDetail(container, pid, nid) {
  const p = pipelines.find(x => x.id === pid);
  if (!p) return;
  const n = p.nodes.find(x => x.id === nid);
  const detailEl = container.querySelector(`.pnode-detail[data-pid="${pid}"]`);
  if (!detailEl) return;

  if (!n || activePipelineNodeId !== pid + ':' + nid) {
    detailEl.innerHTML = '';
    detailEl.classList.remove('visible');
    return;
  }

  const chChips = (n.relatedChapters || []).map(c =>
    `<span class="pnd-chip ch" onclick="loadChapter('${c}')">${c} ${getChapterTitle(c)}</span>`).join('');
  const modChips = (n.relatedModules || []).map(mid => {
    const m = modules.find(x => x.id === mid);
    return m ? `<span class="pnd-chip mod" onclick="openModuleDetail('${mid}')">${m.name}</span>` : '';
  }).join('');
  const bkChips = (n.bottlenecks || []).map(b => `<span class="pnd-chip bk">${b}</span>`).join('');

  detailEl.innerHTML = `
    <div class="pnode-detail-title">${n.label}</div>
    <div class="pnode-detail-grid">
      <div class="pnd-row"><div class="pnd-label">節點角色</div><div class="pnd-val">${n.role}</div></div>
      <div class="pnd-row"><div class="pnd-label">輸入資料</div><div class="pnd-val">${n.input}</div></div>
      <div class="pnd-row"><div class="pnd-label">輸出資料</div><div class="pnd-val">${n.output}</div></div>
      <div class="pnd-row"><div class="pnd-label">可能瓶頸</div><div class="pnd-chips">${bkChips || '<span style="color:var(--text-dim);font-size:10px">—</span>'}</div></div>
      <div class="pnd-row"><div class="pnd-label">相關章節</div><div class="pnd-chips">${chChips || '<span style="color:var(--text-dim);font-size:10px">—</span>'}</div></div>
      <div class="pnd-row"><div class="pnd-label">相關模組</div><div class="pnd-chips">${modChips || '<span style="color:var(--text-dim);font-size:10px">—</span>'}</div></div>
    </div>
  `;
  detailEl.classList.add('visible');

  // Update right panel
  updateRightPanel({
    chapters: n.relatedChapters || [],
    modules: n.relatedModules || [],
    terms: []
  });
}

/* ═══════════════════════════════════════════════════════════
   CORE MODELS PAGE (Phase 5)
═══════════════════════════════════════════════════════════ */
let activeCoreModelId = 'bottleneck-4';
let activeFeatureId = null;
let activeBkItemId = null;

function renderCoreModelsPage() {
  document.querySelectorAll('.nav-link').forEach(l =>
    l.classList.toggle('active', l.dataset.page === 'models'));

  const inner = document.getElementById('contentInner');
  const navItems = coreModels.map((m,i) => `
    <div class="cm-nav-item${activeCoreModelId === m.id ? ' active' : ''}" data-cm="${m.id}">
      <span class="cm-nav-num">0${i+1}</span>${m.title}
    </div>
  `).join('');

  const models = coreModels.map(m => `
    <div class="cm-model${activeCoreModelId === m.id ? ' active' : ''}" data-cm="${m.id}">
      <div class="cm-model-title">${m.title}</div>
      <div class="cm-model-desc">${m.description}</div>
      ${renderCoreModelBody(m)}
    </div>
  `).join('');

  inner.innerHTML = `
    <div class="page-header">
      <div class="page-volume-tag">核心模型</div>
      <h1 class="page-title">核心模型</h1>
      <p class="page-summary">AI 車載系統的五個核心分析框架，從瓶頸、衝突、資源矩陣到失效行為與功能影響映射。</p>
    </div>
    <div class="cm-layout">
      <div class="cm-nav">${navItems}</div>
      <div class="cm-body">${models}</div>
    </div>
  `;

  // Bind nav
  inner.querySelectorAll('.cm-nav-item').forEach(el => {
    el.addEventListener('click', () => {
      activeCoreModelId = el.dataset.cm;
      activeFeatureId = null; activeBkItemId = null;
      renderCoreModelsPage();
    });
  });

  // Bind bottleneck cards
  inner.querySelectorAll('.bk-card').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.bk;
      activeBkItemId = activeBkItemId === id ? null : id;
      inner.querySelectorAll('.bk-card').forEach(c => c.classList.toggle('active', c.dataset.bk === id && activeBkItemId !== null));
      if (activeBkItemId) {
        const cm = coreModels.find(x=>x.id==='bottleneck-4');
        const item = cm?.items.find(x=>x.name===id);
        if (item) updateRightPanel({ chapters: cm.relatedChapters, modules: item.relatedModules, terms: [item.name] });
      }
    });
  });
  if (activeBkItemId) {
    inner.querySelectorAll('.bk-card').forEach(c => c.classList.toggle('active', c.dataset.bk === activeBkItemId));
  }

  // Bind conflict items
  inner.querySelectorAll('.conflict-head').forEach(el => {
    el.addEventListener('click', () => el.parentElement.classList.toggle('open'));
  });

  // Bind failure cards
  inner.querySelectorAll('.fb-head').forEach(el => {
    el.addEventListener('click', () => el.parentElement.classList.toggle('open'));
  });

  // Bind feature buttons
  inner.querySelectorAll('.fi-btn').forEach(el => {
    el.addEventListener('click', () => {
      activeFeatureId = el.dataset.fi;
      inner.querySelectorAll('.fi-btn').forEach(b => b.classList.toggle('active', b.dataset.fi === activeFeatureId));
      inner.querySelectorAll('.fi-flow').forEach(f => f.classList.toggle('visible', f.dataset.fi === activeFeatureId));
      const cm = coreModels.find(x=>x.id==='feature-impact');
      const feat = cm?.features.find(x=>x.id===activeFeatureId);
      if (feat) updateRightPanel({ chapters: feat.relatedChapters, modules: [], terms: [] });
    });
  });

  // Update right panel
  const cm = coreModels.find(x=>x.id===activeCoreModelId);
  if (cm) updateRightPanel({ chapters: cm.relatedChapters, modules: cm.relatedModules, terms: cm.relatedTerms||[] });
}

function renderCoreModelBody(m) {
  if (m.type === 'bottleneck') return renderBottleneckModel(m);
  if (m.type === 'conflict') return renderConflictModel(m);
  if (m.type === 'matrix') return renderResourceMatrix(m);
  if (m.type === 'failure') return renderFailureModel(m);
  if (m.type === 'feature-impact') return renderFeatureImpact(m);
  return '';
}

function renderBottleneckModel(m) {
  const cards = m.items.map(item => `
    <div class="bk-card" data-bk="${item.name}">
      <div class="bk-card-head">
        <div class="bk-icon ${item.iconClass}">${item.icon}</div>
        <div>
          <div class="bk-name">${item.name}</div>
          <div class="bk-unit">${item.measurementUnit}</div>
        </div>
      </div>
      <div class="bk-detail">
        <div class="bk-row"><div class="bk-rlbl">定義</div><div class="bk-rval">${item.definition}</div></div>
        <div class="bk-row"><div class="bk-rlbl">觸發條件</div><div class="bk-rval">${item.triggerConditions.join('；')}</div></div>
        <div class="bk-row"><div class="bk-rlbl">系統症狀</div><div class="bk-rval">${item.systemSymptoms.join('；')}</div></div>
        <div class="bk-row"><div class="bk-rlbl">PM 可觀察</div><div class="bk-rval">${item.pmObservableSignals.join('；')}</div></div>
        <div class="bk-row"><div class="bk-rlbl">失效行為</div><div class="bk-rval">${item.commonFailureBehavior}</div></div>
        <div class="bk-row"><div class="bk-rlbl">相關模組</div>
          <div class="bk-chips">${item.relatedModules.map(mid => { const mod=modules.find(x=>x.id===mid); return mod?`<span class="bk-chip mod" onclick="openModuleDetail('${mid}')">${mod.name}</span>`:''; }).join('')}</div>
        </div>
      </div>
    </div>
  `).join('');
  return `<div class="bk-grid">${cards}</div><p style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono)">點擊卡片展開詳情</p>`;
}

function renderConflictModel(m) {
  const items = m.conflicts.map(c => `
    <div class="conflict-item">
      <div class="conflict-head">
        <span class="conflict-sev sev-${c.severity}">${c.severity==='cr'?'嚴重':c.severity==='hi'?'高':c.severity==='me'?'中':'低'}</span>
        <span class="conflict-title">${c.title}</span>
        <span class="conflict-toggle">▾</span>
      </div>
      <div class="conflict-body">
        <div class="conflict-dl">
          <span class="conflict-dt">場景</span><span class="conflict-dd">${c.scenario}</span>
          <span class="conflict-dt">競爭方</span><span class="conflict-dd">${c.competing.join(' vs ')}</span>
          <span class="conflict-dt">共用資源</span><span class="conflict-dd">${c.shared}</span>
          <span class="conflict-dt">仲裁方式</span><span class="conflict-dd">${c.arbitration}</span>
          <span class="conflict-dt">優先序</span><span class="conflict-dd" style="white-space:pre-line">${c.priorityOrder}</span>
          <span class="conflict-dt">讓步結果</span><span class="conflict-dd">${c.sacrificed}</span>
          <span class="conflict-dt">可見症狀</span><span class="conflict-dd">${c.symptoms}</span>
        </div>
      </div>
    </div>
  `).join('');
  return `<div class="conflict-wrap">${items}</div>`;
}

function renderResourceMatrix(m) {
  const headers = ['模組','DDR BW','算力(TOPS)','功耗','熱貢獻','延遲敏感度','備註'];
  const keys = ['module','ddrBW','tops','power','thermal','latency','notes'];
  const ths = headers.map(h=>`<th>${h}</th>`).join('');
  const rows = m.matrixRows.map(r => `
    <tr>
      <td>${r.module}</td>
      ${['ddrBW','tops','power','thermal','latency'].map(k=>`<td><span class="rm-lv rm-${r[k]}">${r[k]}</span></td>`).join('')}
      <td style="font-size:10px;color:var(--text-muted)">${r.notes}</td>
    </tr>
  `).join('');
  return `
    <div style="overflow-x:auto">
      <table class="rm-table">
        <thead><tr>${ths}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div style="margin-top:10px;font-size:10px;color:var(--text-muted);font-family:var(--font-mono)">
      ⚠ 等級為相對比較值，非精確數字。精確數值需依實際 SoC 平台填入。
    </div>
  `;
}

function renderFailureModel(m) {
  const cards = m.levels.map(lv => `
    <div class="fb-card ${lv.levelClass}">
      <div class="fb-head">
        <span class="fb-level">Level ${lv.level}</span>
        <span class="fb-name">${lv.name}</span>
        <span class="fb-toggle">▾</span>
      </div>
      <div class="fb-body">
        <div class="fb-grid">
          <div class="fb-item"><div class="fb-lbl">觸發條件</div><div class="fb-val">${lv.triggerConditions}</div></div>
          <div class="fb-item"><div class="fb-lbl">系統行為</div><div class="fb-val">${lv.systemBehavior}</div></div>
          <div class="fb-item"><div class="fb-lbl">用戶可見症狀</div><div class="fb-val">${lv.userVisibleSymptoms}</div></div>
          <div class="fb-item"><div class="fb-lbl">可恢復性</div><div class="fb-val">${lv.recoverability}</div></div>
          <div class="fb-item"><div class="fb-lbl">相關瓶頸</div><div class="fb-val">${lv.relatedBottlenecks.join('、')}</div></div>
          <div class="fb-item"><div class="fb-lbl">相關模組</div>
            <div class="bk-chips">${lv.relatedModules.map(mid=>{const mod=modules.find(x=>x.id===mid);return mod?`<span class="bk-chip mod" onclick="openModuleDetail('${mid}')">${mod.name}</span>`:''}).join('')}</div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
  return `<div class="fb-cards">${cards}</div>`;
}

function renderFeatureImpact(m) {
  const btns = m.features.map(f => `
    <button class="fi-btn${activeFeatureId===f.id?' active':''}" data-fi="${f.id}">${f.featureName}</button>
  `).join('');

  const flows = m.features.map(f => `
    <div class="fi-flow${activeFeatureId===f.id?' visible':''}" data-fi="${f.id}">
      <div class="fi-flow-steps">
        <div class="fi-step">
          <div class="fi-step-box">
            <div class="fi-step-label">功能需求</div>
            <div class="fi-step-items"><div class="fi-step-item">${f.featureName}</div></div>
          </div>
        </div>
        <div class="fi-arrow">→</div>
        <div class="fi-step">
          <div class="fi-step-box">
            <div class="fi-step-label">活躍模組</div>
            <div class="fi-step-items">${f.requiredModules.map(x=>`<div class="fi-step-item">${x}</div>`).join('')}</div>
          </div>
        </div>
        <div class="fi-arrow">→</div>
        <div class="fi-step">
          <div class="fi-step-box">
            <div class="fi-step-label">資源消耗</div>
            <div class="fi-step-items">${f.resourceImpact.map(x=>`<div class="fi-step-item hi">${x}</div>`).join('')}</div>
          </div>
        </div>
        <div class="fi-arrow">→</div>
        <div class="fi-step">
          <div class="fi-step-box">
            <div class="fi-step-label">瓶頸壓力</div>
            <div class="fi-step-items">${f.bottleneckPressure.map(x=>`<div class="fi-step-item cr">${x}</div>`).join('')}</div>
          </div>
        </div>
        <div class="fi-arrow">→</div>
        <div class="fi-step">
          <div class="fi-step-box">
            <div class="fi-step-label">排擠效應</div>
            <div class="fi-step-items">${f.excludedOrCompeting.map(x=>`<div class="fi-step-item cr">${x}</div>`).join('')}</div>
          </div>
        </div>
      </div>
      <div class="fi-tradeoff">
        <div class="fi-tradeoff-label">⚠ 取捨說明</div>
        ${f.possibleTradeoff}
      </div>
    </div>
  `).join('');

  return `
    <div class="fi-selector">${btns}</div>
    ${flows}
    ${!activeFeatureId ? '<div style="font-size:12px;color:var(--text-muted);font-family:var(--font-mono)">選擇一個功能查看影響分析</div>' : ''}
  `;
}

   INIT

document.addEventListener('DOMContentLoaded', () => {
  buildChapterTree();
  initNav();
  initSearch();
  renderHome();
});
</script>
