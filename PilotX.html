<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 車載嵌入式系統百科平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   DESIGN TOKENS — Industrial Minimal / Technical Dark
═══════════════════════════════════════════════════════════ */
:root {
  --bg-base:    #0a0c10;
  --bg-surface: #0f1218;
  --bg-raised:  #141820;
  --bg-overlay: #1a2030;
  --bg-hover:   #1e2538;

  --border:     #1e2840;
  --border-mid: #253050;
  --border-hi:  #2e3d66;

  --text-pri:   #d8e0f0;
  --text-sec:   #7a8aaa;
  --text-muted: #3d4d6a;
  --text-dim:   #252e42;

  --accent:     #3b7eff;
  --accent-dim: #1a3880;
  --accent-glow:#3b7eff22;
  --accent-hi:  #6699ff;

  --amber:      #e8a832;
  --amber-dim:  #3a2800;
  --green:      #2ecc80;
  --green-dim:  #0a2018;
  --red:        #e05060;
  --red-dim:    #2a0a10;

  --nav-width:  240px;
  --right-width:220px;
  --header-h:   48px;

  --font-mono:  'JetBrains Mono', monospace;
  --font-body:  'Noto Sans TC', sans-serif;

  --radius-sm:  4px;
  --radius:     6px;
  --radius-lg:  10px;

  --transition: 150ms ease;
}

/* ═══════════════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 14px; -webkit-font-smoothing: antialiased; }

body {
  background: var(--bg-base);
  color: var(--text-pri);
  font-family: var(--font-body);
  line-height: 1.6;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }

a { color: var(--accent-hi); text-decoration: none; }
a:hover { text-decoration: underline; }

button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }

/* ═══════════════════════════════════════════════════════════
   TOP HEADER BAR
═══════════════════════════════════════════════════════════ */
#header {
  height: var(--header-h);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 100;
}

.header-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.logo-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
}

.logo-text {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-sec);
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.logo-text strong { color: var(--text-pri); font-weight: 700; }

/* Global search in header */
.header-search {
  flex: 1;
  max-width: 380px;
  position: relative;
}

.header-search input {
  width: 100%;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 12px 6px 32px;
  color: var(--text-pri);
  font-size: 12px;
  font-family: var(--font-mono);
  outline: none;
  transition: border-color var(--transition);
}

.header-search input:focus {
  border-color: var(--accent);
  background: var(--bg-overlay);
}

.header-search input::placeholder { color: var(--text-muted); }

.search-icon {
  position: absolute;
  left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 13px;
  pointer-events: none;
}

.header-meta {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.version-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  padding: 3px 8px;
  border-radius: var(--radius-sm);
}

/* ═══════════════════════════════════════════════════════════
   MAIN LAYOUT — three-column
═══════════════════════════════════════════════════════════ */
#layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════════════════
   LEFT SIDEBAR — chapter navigation
═══════════════════════════════════════════════════════════ */
#sidebar {
  width: var(--nav-width);
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
  transition: width var(--transition);
}

/* Nav section tabs */
.nav-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  flex-shrink: 0;
}

.nav-tab {
  padding: 10px 8px 9px;
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  transition: all var(--transition);
  white-space: nowrap;
  cursor: pointer;
}

.nav-tab:hover { color: var(--text-sec); }
.nav-tab.active { color: var(--accent-hi); border-bottom-color: var(--accent); }

/* Nav primary links */
.nav-primary {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.nav-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 14px;
  font-size: 12px;
  color: var(--text-sec);
  cursor: pointer;
  transition: all var(--transition);
  border-left: 2px solid transparent;
}

.nav-link:hover {
  background: var(--bg-hover);
  color: var(--text-pri);
}

.nav-link.active {
  background: var(--accent-glow);
  color: var(--accent-hi);
  border-left-color: var(--accent);
}

.nav-link-icon {
  width: 16px;
  font-size: 13px;
  flex-shrink: 0;
  text-align: center;
}

/* Chapter tree */
.chapter-tree {
  flex: 1;
  overflow-y: auto;
  padding: 6px 0;
}

.volume-group {
  margin-bottom: 2px;
}

.volume-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  cursor: pointer;
  transition: background var(--transition);
  user-select: none;
}

.volume-header:hover { background: var(--bg-hover); }

.volume-toggle {
  width: 12px; height: 12px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  font-size: 9px;
  transition: transform var(--transition);
  flex-shrink: 0;
}

.volume-group.open .volume-toggle { transform: rotate(90deg); }

.volume-num {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-glow);
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
}

.volume-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-sec);
  flex: 1;
  line-height: 1.3;
}

.volume-group.open .volume-title { color: var(--text-pri); }

.chapter-list {
  display: none;
  padding: 2px 0;
}

.volume-group.open .chapter-list { display: block; }

.chapter-item {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 5px 14px 5px 30px;
  cursor: pointer;
  transition: all var(--transition);
  border-left: 2px solid transparent;
}

.chapter-item:hover {
  background: var(--bg-hover);
}

.chapter-item.active {
  background: var(--accent-glow);
  border-left-color: var(--accent);
}

.chapter-id {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  padding-top: 2px;
  flex-shrink: 0;
  width: 24px;
}

.chapter-item.active .chapter-id { color: var(--accent); }

.chapter-name {
  font-size: 11px;
  color: var(--text-sec);
  line-height: 1.4;
}

.chapter-item.active .chapter-name { color: var(--text-pri); }
.chapter-item:hover .chapter-name { color: var(--text-pri); }

/* ═══════════════════════════════════════════════════════════
   MAIN CONTENT AREA
═══════════════════════════════════════════════════════════ */
#content {
  flex: 1;
  overflow-y: auto;
  min-width: 0;
  background: var(--bg-base);
}

.content-inner {
  max-width: 820px;
  margin: 0 auto;
  padding: 32px 40px;
}

/* Page header */
.page-header {
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.page-breadcrumb {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.breadcrumb-sep { color: var(--text-dim); }

.page-volume-tag {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-glow);
  border: 1px solid var(--accent-dim);
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
}

.page-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-pri);
  line-height: 1.3;
  margin-bottom: 8px;
}

.page-summary {
  font-size: 14px;
  color: var(--text-sec);
  line-height: 1.7;
  max-width: 600px;
}

/* ═══════════════════════════════════════════════════════════
   CHAPTER TEMPLATE SECTIONS (A~I)
═══════════════════════════════════════════════════════════ */
.section {
  margin-bottom: 24px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--bg-surface);
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}

.section-header:hover { background: var(--bg-raised); }

.section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--accent-hi);
  background: var(--accent-glow);
  border: 1px solid var(--accent-dim);
  width: 22px; height: 22px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-pri);
  flex: 1;
}

.section-toggle {
  font-size: 10px;
  color: var(--text-muted);
  transition: transform var(--transition);
}

.section.open .section-toggle { transform: rotate(180deg); }

.section-body {
  display: none;
  padding: 16px;
  background: var(--bg-base);
  border-top: 1px solid var(--border);
}

.section.open .section-body { display: block; }

/* Section body content */
.section-body p {
  font-size: 13px;
  color: var(--text-sec);
  line-height: 1.8;
  margin-bottom: 10px;
}

.section-body p:last-child { margin-bottom: 0; }

/* Key terms grid */
.terms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}

.term-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  transition: border-color var(--transition);
}

.term-card:hover { border-color: var(--border-hi); }

.term-name {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--accent-hi);
  margin-bottom: 4px;
}

.term-def {
  font-size: 12px;
  color: var(--text-sec);
  line-height: 1.5;
  margin-bottom: 6px;
}

.term-label {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}

.term-detail {
  font-size: 11px;
  color: var(--text-sec);
  line-height: 1.5;
}

/* Engineering points */
.eng-points {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.eng-point {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.eng-num {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-glow);
  border: 1px solid var(--accent-dim);
  width: 24px; height: 24px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.eng-text {
  font-size: 13px;
  color: var(--text-sec);
  line-height: 1.7;
}

/* Risk cards */
.risk-list { display: flex; flex-direction: column; gap: 10px; }

.risk-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--amber);
  border-radius: var(--radius);
  padding: 12px 14px;
}

.risk-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--amber);
  margin-bottom: 6px;
}

.risk-grid {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 3px 8px;
  font-size: 11px;
}

.risk-key { color: var(--text-muted); font-family: var(--font-mono); }
.risk-val { color: var(--text-sec); }

/* Check questions */
.check-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.check-item {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  padding: 8px 12px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

.check-q {
  width: 16px; height: 16px;
  background: var(--bg-overlay);
  border: 1px solid var(--border-hi);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 8px;
  color: var(--text-muted);
  flex-shrink: 0;
  margin-top: 2px;
}

.check-text {
  font-size: 12px;
  color: var(--text-sec);
  line-height: 1.5;
}

/* Related section */
.related-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.related-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent-hi);
  background: var(--accent-glow);
  border: 1px solid var(--accent-dim);
  padding: 3px 9px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
}

.related-tag:hover {
  background: var(--accent-dim);
  border-color: var(--accent);
}

/* Flow diagram */
.flow-diagram {
  display: flex;
  align-items: center;
  gap: 0;
  flex-wrap: wrap;
  padding: 16px;
  background: var(--bg-surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.flow-node {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-overlay);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius);
  padding: 6px 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-pri);
  white-space: nowrap;
  transition: all var(--transition);
  cursor: default;
}

.flow-node.highlight {
  border-color: var(--accent);
  color: var(--accent-hi);
  background: var(--accent-glow);
}

.flow-arrow {
  padding: 0 6px;
  color: var(--text-dim);
  font-size: 14px;
  font-family: var(--font-mono);
}

/* Cross-module impact */
.impact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.impact-col {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
}

.impact-col-title {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}

.impact-col.upstream .impact-col-title { color: var(--text-muted); }
.impact-col.downstream .impact-col-title { color: var(--accent-hi); }
.impact-col.shared .impact-col-title { color: var(--amber); }

.impact-item {
  font-size: 11px;
  color: var(--text-sec);
  padding: 2px 0;
  border-bottom: 1px solid var(--border);
}

.impact-item:last-child { border-bottom: none; }

/* ═══════════════════════════════════════════════════════════
   HOMEPAGE
═══════════════════════════════════════════════════════════ */
.home-hero {
  margin-bottom: 40px;
  padding: 36px 0 32px;
  border-bottom: 1px solid var(--border);
}

.home-eyebrow {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.home-eyebrow::before {
  content: '';
  display: block;
  width: 20px; height: 2px;
  background: var(--accent);
}

.home-title {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-pri);
  line-height: 1.25;
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}

.home-title span { color: var(--accent-hi); }

.home-desc {
  font-size: 14px;
  color: var(--text-sec);
  line-height: 1.8;
  max-width: 580px;
  margin-bottom: 24px;
}

.home-stats {
  display: flex;
  gap: 24px;
}

.stat {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.stat-num {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--text-pri);
}

.stat-label {
  font-size: 11px;
  color: var(--text-muted);
}

/* Quick access grid */
.home-section-title {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 12px;
}

.quick-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 32px;
}

.quick-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all var(--transition);
}

.quick-card:hover {
  border-color: var(--accent);
  background: var(--accent-glow);
}

.quick-card-icon {
  font-size: 18px;
  margin-bottom: 8px;
  display: block;
}

.quick-card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-pri);
  margin-bottom: 4px;
}

.quick-card-sub {
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.4;
}

/* Volume map */
.volume-map {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 32px;
}

.vol-map-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
}

.vol-map-item:hover {
  border-color: var(--border-hi);
  background: var(--bg-raised);
}

.vol-map-num {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--accent);
  background: var(--accent-glow);
  border: 1px solid var(--accent-dim);
  padding: 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
  min-width: 60px;
  text-align: center;
}

.vol-map-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-pri);
  flex: 1;
}

.vol-map-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
}

/* Reading paths */
.path-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.path-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all var(--transition);
}

.path-card:hover { border-color: var(--border-hi); }

.path-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-pri);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.path-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid;
}

.path-badge.beginner { color: var(--green); border-color: var(--green); background: var(--green-dim); }
.path-badge.arch { color: var(--accent-hi); border-color: var(--accent-dim); background: var(--accent-glow); }
.path-badge.product { color: var(--amber); border-color: var(--amber); background: var(--amber-dim); }
.path-badge.mp { color: var(--red); border-color: var(--red); background: var(--red-dim); }

.path-steps {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.path-step {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 3px;
}

/* ═══════════════════════════════════════════════════════════
   RIGHT SIDEBAR
═══════════════════════════════════════════════════════════ */
#right-panel {
  width: var(--right-width);
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.right-section {}

.right-section-title {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.right-link {
  display: block;
  padding: 5px 0;
  font-size: 11px;
  color: var(--text-sec);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: color var(--transition);
}

.right-link:last-child { border-bottom: none; }
.right-link:hover { color: var(--accent-hi); }

.right-link-id {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  margin-right: 4px;
}

.right-tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-sec);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 3px;
  margin: 2px 2px 2px 0;
  cursor: pointer;
  transition: all var(--transition);
}

.right-tag:hover {
  border-color: var(--accent);
  color: var(--accent-hi);
}

/* ═══════════════════════════════════════════════════════════
   SEARCH RESULTS
═══════════════════════════════════════════════════════════ */
.search-results {
  display: none;
  position: absolute;
  top: calc(var(--header-h) + 4px);
  left: 50%;
  transform: translateX(-50%);
  width: 560px;
  max-height: 400px;
  overflow-y: auto;
  background: var(--bg-raised);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius-lg);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  z-index: 200;
}

.search-results.visible { display: block; }

.search-result-item {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
  align-items: flex-start;
}

.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--bg-overlay); }

.result-type {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
  margin-top: 1px;
  flex-shrink: 0;
}

.type-chapter { background: var(--accent-glow); color: var(--accent-hi); border: 1px solid var(--accent-dim); }
.type-module  { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
.type-term    { background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber); }

.result-info {}
.result-title { font-size: 13px; color: var(--text-pri); margin-bottom: 2px; }
.result-summary { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

.search-empty {
  padding: 24px;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

/* ═══════════════════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════════════════ */
.hidden { display: none !important; }

.tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  border: 1px solid;
}

.tag-blue { color: var(--accent-hi); border-color: var(--accent-dim); background: var(--accent-glow); }
.tag-amber { color: var(--amber); border-color: var(--amber); background: var(--amber-dim); }
.tag-green { color: var(--green); border-color: var(--green); background: var(--green-dim); }

.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

.mono { font-family: var(--font-mono); }
.text-sec { color: var(--text-sec); }
.text-muted { color: var(--text-muted); }
.text-accent { color: var(--accent-hi); }

/* Placeholder pages */
.placeholder-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 300px;
  gap: 12px;
}

.placeholder-icon {
  font-size: 36px;
  opacity: 0.3;
}

.placeholder-text {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
}

.placeholder-note {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  font-family: var(--font-mono);
}

/* Position context for search dropdown */
#header { position: relative; }

/* ═══════════════════════════════════════════════════════════
   PHASE 4 — Pipeline page styles
═══════════════════════════════════════════════════════════ */
.pipeline-list { display: flex; flex-direction: column; gap: 16px; }

.pipeline-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: border-color var(--transition);
}
.pipeline-card:hover { border-color: var(--border-hi); }
.pipeline-card.selected { border-color: var(--accent); }

.pipeline-card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; background: var(--bg-raised);
  cursor: pointer; border-bottom: 1px solid var(--border);
}
.pipeline-card-title { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--text-pri); }
.pipeline-card-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.pipeline-expand-btn {
  font-size: 10px; color: var(--text-muted); background: var(--bg-overlay);
  border: 1px solid var(--border); padding: 3px 8px; border-radius: var(--radius-sm);
  cursor: pointer; font-family: var(--font-mono); transition: all var(--transition);
  white-space: nowrap;
}
.pipeline-expand-btn:hover { border-color: var(--accent); color: var(--accent-hi); }

.pipeline-diagram {
  padding: 16px 20px;
  overflow-x: auto;
}

.pipeline-flow {
  display: flex; align-items: center; flex-wrap: nowrap;
  gap: 0; min-width: max-content;
}

.pnode {
  display: flex; flex-direction: column; align-items: center;
  background: var(--bg-overlay); border: 1px solid var(--border-hi);
  border-radius: var(--radius); padding: 8px 12px;
  cursor: pointer; transition: all var(--transition);
  min-width: 80px; text-align: center; flex-shrink: 0;
}
.pnode:hover { border-color: var(--accent); background: var(--accent-glow); }
.pnode.active { border-color: var(--accent); background: var(--accent-glow); box-shadow: 0 0 0 2px var(--accent-dim); }
.pnode-label { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--text-pri); white-space: nowrap; }
.pnode-type { font-size: 9px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; }

.pnode.type-sensor { border-color: #2563eb; background: #0a1828; }
.pnode.type-sensor .pnode-label { color: #60a5fa; }
.pnode.type-processor { border-color: #0891b2; background: #061820; }
.pnode.type-processor .pnode-label { color: #22d3ee; }
.pnode.type-memory { border-color: #ca6f1e; background: #1a0e04; }
.pnode.type-memory .pnode-label { color: #fbbf24; }
.pnode.type-storage { border-color: #6d28d9; background: #100818; }
.pnode.type-storage .pnode-label { color: #c4b5fd; }
.pnode.type-output { border-color: #166534; background: #041408; }
.pnode.type-output .pnode-label { color: #4ade80; }
.pnode.type-network { border-color: #9d174d; background: #180810; }
.pnode.type-network .pnode-label { color: #f472b6; }
.pnode.type-decision { border-color: var(--amber); background: var(--amber-dim); }
.pnode.type-decision .pnode-label { color: var(--amber); }

.pedge {
  display: flex; flex-direction: column; align-items: center;
  padding: 0 6px; flex-shrink: 0;
}
.pedge-arrow { color: var(--text-dim); font-size: 16px; line-height: 1; }
.pedge-label { font-size: 9px; color: var(--text-muted); font-family: var(--font-mono); white-space: nowrap; margin-top: 1px; }

/* Node detail panel (below diagram) */
.pnode-detail {
  display: none;
  margin: 0 16px 16px; padding: 14px;
  background: var(--bg-base); border: 1px solid var(--accent-dim);
  border-radius: var(--radius); border-left: 3px solid var(--accent);
}
.pnode-detail.visible { display: block; }
.pnode-detail-title { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--accent-hi); margin-bottom: 10px; }
.pnode-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
.pnd-row { }
.pnd-label { font-size: 9px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); margin-bottom: 3px; }
.pnd-val { font-size: 11px; color: var(--text-sec); line-height: 1.5; }
.pnd-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.pnd-chip { font-family: var(--font-mono); font-size: 9px; padding: 1px 6px; border-radius: 3px; border: 1px solid; cursor: pointer; transition: all var(--transition); }
.pnd-chip.ch { color: var(--green); border-color: var(--green); background: var(--green-dim); }
.pnd-chip.mod { color: var(--accent-hi); border-color: var(--accent-dim); background: var(--accent-glow); }
.pnd-chip.bk { color: var(--amber); border-color: var(--amber); background: var(--amber-dim); }

/* Pipeline info panel */
.pipeline-info {
  display: none;
  margin: 0 16px 16px; padding: 14px;
  background: var(--bg-base); border: 1px solid var(--border-hi);
  border-radius: var(--radius);
}
.pipeline-info.visible { display: block; }
.pipeline-bottleneck-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
.pbk-chip { font-size: 10px; font-family: var(--font-mono); padding: 2px 7px; border-radius: 3px; background: var(--amber-dim); border: 1px solid var(--amber); color: var(--amber); }


/* Filter bar */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.filter-search {
  position: relative;
  flex: 1;
  min-width: 180px;
  max-width: 280px;
}

.filter-search input {
  width: 100%;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 10px 6px 28px;
  color: var(--text-pri);
  font-size: 12px;
  font-family: var(--font-mono);
  outline: none;
  transition: border-color var(--transition);
}

.filter-search input:focus { border-color: var(--accent); }
.filter-search input::placeholder { color: var(--text-muted); }
.filter-search .fi { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 11px; pointer-events: none; }

.filter-chips { display: flex; flex-wrap: wrap; gap: 5px; }

.fchip {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 3px 9px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  color: var(--text-muted);
  background: var(--bg-raised);
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.fchip:hover { border-color: var(--border-hi); color: var(--text-sec); }
.fchip.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent-hi); }

.filter-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  margin-left: auto;
}

/* Card grid */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
}

/* Module card */
.mod-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.mod-card:hover { border-color: var(--border-hi); background: var(--bg-raised); }
.mod-card.selected { border-color: var(--accent); background: var(--accent-glow); }

.mod-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.mod-card-name { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--text-pri); }
.mod-card-layer { font-family: var(--font-mono); font-size: 9px; color: var(--accent-hi); background: var(--accent-glow); border: 1px solid var(--accent-dim); padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
.mod-card-def { font-size: 11px; color: var(--text-sec); line-height: 1.5; }

.mod-card-meta { display: flex; flex-direction: column; gap: 3px; }
.mod-card-meta-row { display: flex; gap: 5px; align-items: flex-start; }
.mod-card-meta-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); width: 42px; flex-shrink: 0; padding-top: 1px; }
.mod-card-meta-val { font-size: 10px; color: var(--text-sec); line-height: 1.4; }

.mod-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.mod-chip {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  padding: 1px 5px;
  border-radius: 3px;
  cursor: pointer;
  transition: all var(--transition);
}
.mod-chip:hover { border-color: var(--accent-dim); color: var(--accent-hi); }
.mod-chip.ch { color: var(--green); border-color: var(--green); background: var(--green-dim); }

/* Detail panel */
.detail-panel {
  display: none;
  background: var(--bg-surface);
  border: 1px solid var(--border-hi);
  border-radius: var(--radius-lg);
  margin-bottom: 20px;
  overflow: hidden;
}
.detail-panel.visible { display: block; }

.dp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--bg-raised);
  border-bottom: 1px solid var(--border);
}
.dp-title { display: flex; align-items: center; gap: 10px; }
.dp-name { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--text-pri); }
.dp-layer { font-family: var(--font-mono); font-size: 10px; color: var(--accent-hi); background: var(--accent-glow); border: 1px solid var(--accent-dim); padding: 3px 9px; border-radius: var(--radius-sm); }
.dp-close { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: var(--radius-sm); transition: all var(--transition); }
.dp-close:hover { color: var(--text-pri); background: var(--bg-overlay); }

.dp-body { padding: 16px 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.dp-section { }
.dp-section-full { grid-column: 1 / -1; }
.dp-section-title { font-family: var(--font-mono); font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.dp-def { font-size: 13px; color: var(--text-sec); line-height: 1.7; }
.dp-list { display: flex; flex-direction: column; gap: 3px; }
.dp-list-item { font-size: 11px; color: var(--text-sec); padding: 2px 0; border-bottom: 1px solid var(--border); display: flex; gap: 6px; }
.dp-list-item:last-child { border-bottom: none; }
.dp-list-item::before { content: '›'; color: var(--text-muted); flex-shrink: 0; }
.dp-chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
.dp-chip {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  color: var(--text-sec);
  background: var(--bg-raised);
  cursor: pointer;
  transition: all var(--transition);
}
.dp-chip:hover { border-color: var(--accent-dim); color: var(--accent-hi); }
.dp-chip.ch-chip { color: var(--green); border-color: var(--green); background: var(--green-dim); }
.dp-chip.term-chip { color: var(--amber); border-color: var(--amber); background: var(--amber-dim); }
.dp-chip.mod-chip-link { color: var(--accent-hi); border-color: var(--accent-dim); background: var(--accent-glow); }

/* Glossary card */
.glos-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all var(--transition);
}
.glos-card:hover { border-color: var(--border-hi); background: var(--bg-raised); }
.glos-card.selected { border-color: var(--amber); background: var(--amber-dim); }

.glos-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.glos-card-term { font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--text-pri); }
.glos-card-cat { font-family: var(--font-mono); font-size: 9px; color: var(--amber); background: var(--amber-dim); border: 1px solid var(--amber); padding: 2px 6px; border-radius: 3px; white-space: nowrap; }
.glos-card-def { font-size: 11px; color: var(--text-sec); line-height: 1.5; margin-bottom: 8px; }
.glos-card-chs { display: flex; flex-wrap: wrap; gap: 4px; }
/* ═══════════════════════════════════════════════════════════
   PHASE 5 — Core Models page styles
═══════════════════════════════════════════════════════════ */
.cm-layout { display: flex; gap: 14px; }
.cm-nav { width: 180px; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
.cm-nav-item {
  padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--bg-surface); cursor: pointer; transition: all var(--transition);
  font-size: 11px; color: var(--text-sec);
}
.cm-nav-item:hover { border-color: var(--border-hi); color: var(--text-pri); }
.cm-nav-item.active { border-color: var(--accent); background: var(--accent-glow); color: var(--accent-hi); }
.cm-nav-num { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); display: block; margin-bottom: 2px; }
.cm-body { flex: 1; min-width: 0; }
.cm-model { display: none; }
.cm-model.active { display: block; }
.cm-model-title { font-family: var(--font-mono); font-size: 16px; font-weight: 700; color: var(--text-pri); margin-bottom: 6px; }
.cm-model-desc { font-size: 13px; color: var(--text-sec); margin-bottom: 18px; line-height: 1.6; }

/* Bottleneck cards */
.bk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.bk-card {
  background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; cursor: pointer;
  transition: border-color var(--transition);
}
.bk-card:hover { border-color: var(--border-hi); }
.bk-card.active { border-color: var(--accent); }
.bk-card-head { padding: 10px 12px; display: flex; align-items: center; gap: 8px; }
.bk-icon { width: 28px; height: 28px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.bk-icon.ddr { background: rgba(59,111,245,.2); }
.bk-icon.thermal { background: rgba(224,80,80,.2); }
.bk-icon.latency { background: rgba(232,160,48,.2); }
.bk-icon.power { background: rgba(168,85,247,.2); }
.bk-name { font-family: var(--font-mono); font-size: 12px; font-weight: 700; color: var(--text-pri); }
.bk-unit { font-size: 9px; color: var(--text-muted); margin-top: 1px; }
.bk-detail { display: none; padding: 10px 12px; border-top: 1px solid var(--border); background: var(--bg-base); }
.bk-card.active .bk-detail { display: block; }
.bk-row { display: flex; gap: 6px; margin-bottom: 6px; font-size: 11px; }
.bk-row:last-child { margin-bottom: 0; }
.bk-rlbl { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); width: 60px; flex-shrink: 0; padding-top: 1px; }
.bk-rval { color: var(--text-sec); flex: 1; line-height: 1.5; }
.bk-chips { display: flex; flex-wrap: wrap; gap: 4px; }

'1.4': {
  id: '1.4', volume: 'VOL 1', volumeTitle: '系統本質',
  title: '整體系統角色定位',
  summary: '說明 SoC、ECU、Domain Controller 在整車電子架構中的角色層次與演進趨勢。',
  layer: '系統架構層',
  content: {
    concept: `現代車輛的電子電氣架構（E/E Architecture）正在經歷從「分散式 ECU 架構」到「域集中式架構」再到「中央計算架構」的演進。

分散式 ECU 架構：每個功能由一個專屬 ECU 負責，整車可能有 70～100 個 ECU，透過 CAN bus 互相通訊。優點是功能獨立、容易認證；缺點是成本高、線束重、難以支援複雜的跨功能協作。

域集中式架構（Domain Controller）：將同一功能域（如 ADAS、Cockpit、底盤）的多個 ECU 整合為一個高算力的域控制器，運行在高性能 SoC 上。AI 車載系統通常是 ADAS 域控或 Cockpit 域控的核心計算平台。

中央計算架構（Zonal Architecture）：進一步將域控制器整合為少數幾個「中央計算平台」，輔以負責物理連接的「區域 ECU（Zonal ECU）」。這是業界的長期演進方向，但現階段大多數量產車仍採用域集中式架構。

AI 車載 SoC 在這個架構中的角色：作為 ADAS 域或 Cockpit 域的大腦，接收感測器輸入，執行 AI 推論，輸出決策指令，並透過 CAN/Ethernet 與其他 ECU 協作。`,
    systemPosition: 'Domain Controller（含 AI SoC）位於整車電子架構的計算中心，介於感測器層與執行器層之間，透過車載網路連接全車。',
    normalFlow: { type: 'flow', nodes: ['感測器層', 'Domain Controller (AI SoC)', '車載網路 (CAN/Ethernet)', '執行 ECU 層', '執行器'] },
    keyTerms: [
      { name: 'E/E Architecture', definition: '電子電氣架構，描述整車所有 ECU 與通訊網路的整體組織方式。', meaning: '決定了 AI SoC 在車輛中的位置、介面協定、與其他 ECU 的通訊方式。', why: 'AI 車載系統的設計邊界由 E/E Architecture 決定，必須在 OEM 定義的架構框架內工作。' },

      { name: 'CAN FD', definition: 'Controller Area Network Flexible Data Rate，車載 CAN 通訊的升級版本，支援最高 8 Mbps。', meaning: '是 AI SoC 向執行 ECU 傳送決策指令的主要通訊協定，決策輸出的最後一段傳輸。', why: 'CAN FD 的頻寬上限與訊息優先序設計，影響 ADAS 決策指令的即時性。' },
      { name: 'Zonal Architecture', definition: '以「車輛區域（Zone）」而非「功能域」組織 ECU 的新型架構，每個 Zone 對應車輛的一個物理區域。', meaning: '是業界長期演進方向，進一步減少線束、降低架構複雜度、支援更高程度的 OTA 彈性。', why: '了解架構演進趨勢有助於評估現有平台的長期可延伸性。' }
    ],
    engineeringPoints: [

'2.1': {
  id: '2.1', volume: 'VOL 2', volumeTitle: '系統分層',
  title: '硬體層',
  summary: '介紹 SoC、記憶體（DDR）、感測器介面、電源軌等硬體層的主要組成與設計約束。',
  layer: '硬體層',
  content: {
    concept: `硬體層是整個系統的物理基礎，所有軟體功能最終都必須在硬體提供的能力範圍內實現。車載 AI 系統的硬體層核心由四個部分組成：

SoC（System on Chip）：整合了 CPU、NPU、ISP、GPU、記憶體控制器等多個 IP 核心的單一晶片，是整個系統的計算中樞。現代車載 AI SoC 的算力從數 TOPS 到數百 TOPS 不等（需依實際平台填入）。

DDR（記憶體）：SoC 所有模組共享的主記憶體，承擔所有資料的讀寫工作。DDR 的頻寬（GB/s）而非容量（GB）是最關鍵的設計指標。

感測器介面（MIPI / SerDes）：連接攝影機等感測器的高速介面，限制了系統可支援的攝影機路數與解析度上限。

電源軌（Power Rail）：PMIC 管理的多組電源供應，為 SoC 的不同電壓區域提供穩定電源。電源軌設計影響系統的功耗效率與 EMI 特性。`,
    systemPosition: '硬體層位於系統分層的最底層，所有上層軟體的功能都受限於硬體的物理能力。硬體層的設計決策影響範圍最廣、修改成本最高。',
    normalFlow: { type: 'flow', nodes: ['電源系統 (PMIC)', 'SoC', 'DDR 記憶體', 'MIPI/SerDes 介面', '感測器/顯示器'] },
    keyTerms: [
      { name: 'DDR BW（頻寬）', definition: 'DDR 每秒可傳輸的資料量，單位為 GB/s，是 SoC 所有模組共享的頻寬池。', meaning: '是車載 AI 系統最常見的系統瓶頸之一，所有模組（ISP、NPU、Encoder、CPU）都在競爭這個共用資源。', why: '了解 DDR BW 是理解系統資源競爭的起點，幾乎所有功能設計都需要考慮其 DDR 頻寬消耗。' },
      { name: 'Power Rail', definition: '電源軌，PMIC 輸出的特定電壓供電路徑，不同的 SoC IP 核心可能有不同的供電電壓需求。', meaning: '電源軌設計影響系統的功耗效率、EMI 特性與上電時序，是硬體設計的重要一環。', why: '電源軌問題常在系統整合時才被發現，且修改成本高，必須在硬體設計初期充分規劃。' },
      { name: 'TDP', definition: 'Thermal Design Power，熱設計功耗，SoC 在設計條件下的最大持續功耗。', meaning: '是散熱設計的基準輸入，決定需要多大的散熱解決方案（被動散熱 / 主動散熱）。', why: 'TDP 選擇與散熱方案成本直接掛鉤，是硬體選型時的重要考量（需依實際 SoC 規格填入）。' }
    ],
    engineeringPoints: [
      'SoC 選型一旦確定，系統的算力上限、DDR 頻寬上限、介面數量就基本確定，後期難以升級。',
      'DDR BW 瓶頸通常在多功能同時運行（多路攝影機 + AI 推論 + 錄影）時才充分暴露。',
      'MIPI CSI-2 的 lane 數決定攝影機資料的輸入頻寬上限，超過此上限需要 SerDes 進行序列化。',
      '電源軌的上電與下電時序必須符合 SoC 規格書的要求，順序錯誤可能導致 SoC 損壞或無法啟動。',
      '硬體層設計完成後，修改一個 PCB 走線可能需要重新布線與驗證，週期長達數週到數月。'
    ],

  layer: '韌體層',
  content: {
    concept: `韌體層（Firmware Layer）是連接硬體與作業系統的橋樑，讓上層軟體不需要直接控制硬體就能使用各種功能。車載 AI 系統的韌體層主要由三個部分組成：

Bootloader：系統上電後執行的第一段程式碼，負責初始化基本硬體（記憶體、時鐘）並載入作業系統或其他韌體。在車載系統中，Bootloader 也是安全啟動（Secure Boot）的執行者，確保只有經過授權的軟體才能啟動。

BSP（Board Support Package）：針對特定硬體平台（電路板）的驅動套件，提供 CPU、DDR、儲存、通訊介面等硬體的初始化與存取介面。BSP 通常由 SoC 廠商或電路板設計者維護。

Driver：作業系統用來控制特定硬體模組（Camera、ISP、NPU、Encoder 等）的程式模組。Driver 的品質直接影響功能的效能與穩定性。

韌體層的特殊性在於：它的 Bug 通常非常難以除錯（沒有完整的 OS 除錯工具），且對系統啟動和功能可靠性影響巨大。`,
    systemPosition: '韌體層位於硬體層之上、OS 層之下，是系統分層中「離硬體最近的軟體」。所有上層軟體對硬體的操作都需要透過韌體層完成。',

'2.3': {
  id: '2.3', volume: 'VOL 2', volumeTitle: '系統分層',
  title: 'OS 與中介層',
  summary: '說明 RTOS、Linux、Hypervisor 在車載系統中的角色分工，以及多 OS 虛擬化架構的設計邏輯。',
  layer: 'OS 層',
  content: {
    concept: `車載 AI 系統通常需要同時滿足兩種截然不同的需求：即時控制（ADAS 的毫秒級響應）與豐富應用（Cockpit 的 Android 生態）。這兩種需求對作業系統的要求是互相矛盾的，解決方案是透過 Hypervisor 同時運行多個 OS。

RTOS（Real-Time OS）：提供確定性時序保證，適合安全關鍵的即時控制任務（如 AEB 觸發、感測器資料採集）。代表方案有 QNX、FreeRTOS、VxWorks 等。

Linux：提供豐富的生態與開發工具，適合 AI 框架、媒體處理、複雜應用程式等非即時任務。Android 車機系統通常建構在 Linux 之上。

Hypervisor：虛擬化中間層，讓同一顆 SoC 可以同時運行 RTOS（ADAS 域）與 Linux/Android（Cockpit 域），並透過硬體虛擬化確保兩者的資源隔離，防止 Cockpit 的故障影響 ADAS 的安全功能。`,
    systemPosition: 'OS 層位於韌體層（BSP/Driver）之上、應用框架層之下，是軟體生態的基礎。Hypervisor 作為 OS 層的底層，管理多個 OS 的資源分配。',
    normalFlow: { type: 'flow', nodes: ['硬體 SoC', 'Hypervisor 資源隔離', 'RTOS (ADAS 即時任務)', 'Linux/Android (Cockpit 應用)', '應用框架層'] },
    keyTerms: [
      { name: 'RTOS', definition: 'Real-Time Operating System，即時作業系統，提供確定性的任務執行時序保證。', meaning: '確保 ADAS 任務在規定的時間內完成，無論系統負載如何波動。', why: '理解 RTOS 的即時性保證，是評估 ADAS 功能時序可靠性的基礎。' },
      { name: 'Hypervisor', definition: '虛擬機器監控程式，讓多個 OS 可以在同一硬體平台上獨立且安全地並行運行。', meaning: '在 AI 車載系統中，Hypervisor 是 ADAS 功能安全隔離的關鍵技術，防止 Cockpit OS 的故障擴散到 ADAS 域。', why: '使用 Hypervisor 可以降低硬體成本（單 SoC 取代多 SoC），但增加軟體複雜度，需要評估 Trade-off。' },
      { name: '任務優先序', definition: '在 RTOS 中，依據重要性為各任務設定不同的執行優先級，確保高優先級任務能及時被 CPU 處理。', meaning: 'ADAS 安全關鍵任務通常具有最高優先級，確保即使系統負載高，這些任務也能在規定時間內完成。', why: '任務優先序設計是 RTOS 應用中防止即時性違規（Deadline Miss）的核心機制。' }
    ],
    engineeringPoints: [

      '多 OS 架構下，OS 之間的通訊（如 RTOS 的 ADAS 決策傳給 Android 顯示）需要透過共享記憶體或虛擬通訊通道，引入額外延遲。',

      'Linux Kernel 的升級與 RTOS 版本管理是獨立的，但 Hypervisor 版本需要與兩者相容，是長期維護的複雜性來源。'
    ],
    risks: [

      { title: '多 OS 通訊延遲影響跨域功能', trigger: 'RTOS 的 ADAS 決策資訊需要顯示在 Android Cockpit 上，OS 間通訊延遲超出預期。', impact: 'ADAS 警示顯示延遲，用戶體驗受影響，嚴重時可能影響安全性。', prevention: '在系統設計初期分析跨 OS 通訊的延遲需求，並在 Hypervisor 設計中優化通訊路徑。' }

'2.5': {
  id: '2.5', volume: 'VOL 2', volumeTitle: '系統分層',
  title: '應用層',
  summary: '說明 ADAS 功能、Cockpit 功能、OTA 更新在應用層的設計邏輯與主要差異。',
  layer: '應用層',
  content: {
    concept: `應用層（Application Layer）是系統分層的最頂端，也是用戶直接體驗到的功能所在。車載 AI 系統的應用層主要分為三類：

ADAS 功能：自動緊急煞車（AEB）、車道偏移警示（LKA）、自適應巡航（ACC）、盲點偵測（BSD）等安全功能。ADAS 功能直接涉及行車安全，必須符合對應的功能安全（ISO 26262）要求，對 E2E 延遲、AI 準確率的要求最為嚴格。

Cockpit 功能：導航、影音娛樂、語音助手、HMI（人機介面）等體驗功能。Cockpit 功能的功能安全等級通常低於 ADAS，但用戶體驗指標（響應速度、畫面品質）的要求更高。

OTA（Over-The-Air）更新：應用層的更新機制，讓車輛軟體可以在不進廠的情況下遠端升級。OTA 涉及的不只是應用層，也可能包含韌體層更新（FOTA）。

    concept:`Power 限制是 Thermal 限制的「能量側孿生兄弟」——幾乎所有 Thermal 問題的根源都是功耗超出設計預算。車載系統的電源來自整車 12V 電源（或電動車高壓電池），透過 PMIC 轉換為各模組所需的電壓。

PMIC 有最大輸出電流限制，超過後會觸發過流保護（導致系統重啟）或電壓下垂（導致系統不穩定）。SoC 全算力運行時的峰值功耗可能接近或超過 PMIC 的設計上限，因此 SoC 廠商通常提供 DVFS（動態電壓頻率調節）機制，在功耗超標時主動降低電壓和頻率。

在電動車中，車載計算平台的功耗還影響整車續航里程，是整車功耗預算中的重要部分，需要在整車系統設計時統一規劃。`,
    systemPosition:'Power 限制位於整車電源系統（上游）和 SoC 所有功能（下游）之間，PMIC 是中間的關鍵元件。',
    normalFlow:{type:'flow', nodes:['整車 12V 電源', 'PMIC 轉換', '多路電源軌', 'SoC（主要消耗）', 'Thermal 累積']},
    keyTerms:[
      {name:'DVFS', definition:'Dynamic Voltage and Frequency Scaling，動態電壓頻率調節，在功耗超標時降低電壓和頻率。', meaning:'是 Power 和 Thermal 管理的核心技術，讓 SoC 在不同負載下自動調整工作點。', why:'了解 DVFS 有助於理解為什麼「系統在使用一段時間後效能下降」——這是 DVFS 主動降低效能保護系統。'},
      {name:'Peak vs Sustained Power', definition:'峰值功耗（短期最大值）vs 持續功耗（長期可維持值），兩者通常相差 20～40%（需依 SoC 規格確認）。', meaning:'散熱和電源設計應以持續功耗為基準，但 PMIC 選型需考慮峰值功耗。', why:'以持續功耗設計但峰值功耗超出 PMIC 上限，系統在功能剛啟動時可能觸發保護重啟。'}

'6.3': {
  id:'6.3', volume:'VOL 6', volumeTitle:'系統限制', title:'Latency 限制',
  summary:'ADAS 安全功能的端對端延遲約束，是功能安全合規的時間邊界，超標直接等同於安全功能不合規。',
  layer:'系統全層',
  content:{
    concept:`Latency（延遲）限制在 ADAS 系統中的意義與其他系統完全不同——它不是「體驗指標」，而是「安全指標」。ADAS 功能的 E2E Latency 超過安全需求閾值，等同於在緊急情況下車輛反應不夠快，可能導致事故。

E2E Latency 的組成從感測器採集開始，經過 ISP 處理、DDR 傳輸、NPU 推論、CPU 後處理，到 CAN 傳輸和執行器響應，每個環節都貢獻延遲。整個鏈路的延遲是各環節的加總，任何一個環節的異常（DDR BW 競爭、Thermal Throttling、CPU 高負載）都會讓 E2E 超標。

「平均延遲合規」不代表「功能安全合規」——功能安全要求的是 P99（99th percentile）甚至 P999 延遲合規，即在最壞情況下也必須合規。這是車載 Latency 管理比消費電子更嚴格的根本原因。`,
    systemPosition:'Latency 限制貫穿整個資料流路徑，從感測器（最上游）到執行器（最下游），是 E2E 系統性指標。',
    normalFlow:{type:'flow', nodes:['感測器採集', 'ISP 處理', 'DDR 傳輸', 'NPU 推論', 'CPU 後處理', 'CAN 傳輸', '執行器響應']},
    keyTerms:[
      {name:'E2E Latency Budget', definition:'分配給每個 Pipeline 環節的最大允許延遲，加總不超過 E2E 安全閾值。', meaning:'是端對端延遲管理工具，確保每個模組的設計目標都在合理範圍內。', why:'沒有延遲預算，個別模組可能各自達標但加總超出系統需求。'},
      {name:'P99 延遲', definition:'99% 的請求在此時間內完成的延遲統計量，代表尾端延遲。', meaning:'功能安全驗證必須使用 P99 而非平均——系統在 1% 的情況下超標就可能是功能安全問題。', why:'平均延遲 = 50% 時間合規；P99 = 99% 時間合規。ADAS 安全功能需要 P99 甚至 P999 合規。'},
      {name:'確定性延遲', definition:'每次執行都在固定時間範圍內完成，延遲不受系統負載影響。', meaning:'RTOS 提供確定性延遲保障，Linux 不提供——這是 ADAS 為什麼需要 RTOS 的核心原因。', why:'了解確定性延遲有助於理解 RTOS、Hypervisor 在車載系統中為什麼不可或缺。'}
    ],
    engineeringPoints:[
      'E2E Latency 必須在最壞情況（全功能壓力 + 高溫 Throttling）下量測，而非在最佳條件下。',
      'DDR BW 競爭和 Thermal Throttling 是 E2E Latency 超標最常見的兩個根本原因。',
      'ADAS 安全功能必須在 RTOS 中執行以獲得確定性延遲保障，不能依賴 Linux 的非確定性排程。',
      'CAN 訊息優先序設計是 Latency 管理的最後一段，必須確保 ADAS 指令在 CAN 繁忙時仍優先傳輸。',
      'Latency 預算分配應在系統架構設計初期完成，後期優化的空間和代價都比早期大得多。'
    ],
    risks:[
      {title:'P99 延遲在壓力場景下超出 ADAS 安全閾值', trigger:'全功能 + 高溫 + Throttling 的複合場景下，E2E Latency 超標。', impact:'ADAS 功能安全測試不合規，無法通過認證。', prevention:'在功能安全驗收測試中，必須包含複合壓力場景下的 P99 延遲量測。'},
      {title:'CPU 後處理延遲在高負載場景被忽略', trigger:'只量測了 NPU 推論延遲，忽略 CPU 後處理（NMS 等）的延遲貢獻。', impact:'系統整合後發現 E2E 超標，且根本原因在 CPU 而非 NPU。', prevention:'E2E Latency 預算必須涵蓋所有環節，包含 CPU 後處理和 CAN 傳輸。'}
    ],
    crossModuleImpact:{
      upstream:['DDR BW（NPU 等待頻寬）', 'Thermal Throttling（降頻）'],
      downstream:['ADAS 功能安全合規性', 'ADAS 認證通過與否'],
      shared:['E2E Latency 預算（所有環節共用）']
    },
    checkQuestions:['E2E Latency 在 ADAS 中為什麼是安全指標而非體驗指標？', '為什麼 P99 延遲比平均延遲更重要？', '確定性延遲是什麼，RTOS 如何提供這個保障？', 'DDR BW 競爭如何導致 E2E Latency 超標？'],
    related:{chapters:['4.2','4.4','4.7','5.1','5.2','6.1'], modules:['npu','isp','can','rtos','ddr'], terms:['Latency','RTOS','DDR Bandwidth','ISO 26262']}
  }

'6.4': {

  summary:'DDR 容量（GB）和 SoC 片上 SRAM 的容量限制，影響可同時載入的 AI 模型數量與大小。',
  layer:'硬體層',
  content:{
    concept:`記憶體容量限制是 DDR 頻寬問題之外的另一個維度——即使頻寬足夠，但 DDR 容量不足時，多個大型 AI 模型可能無法同時常駐記憶體，需要頻繁換入換出，大幅增加延遲。

AI 模型的記憶體需求不只是模型本身的大小（Model Weights），還包含推論時的中間特徵圖（Feature Map）、輸入 / 輸出緩衝區。一個大型目標偵測模型的記憶體需求可能遠超其模型檔案大小（需依實際模型確認）。

SoC 片上 SRAM（On-chip SRAM）是 NPU 的高速緩衝，大小決定了可以不頻繁讀取 DDR 就能執行多大的模型。SRAM 越大，NPU 效率越高（減少 DDR 存取），但 SRAM 在 SoC 上是非常昂貴的面積資源。`,

    risks:[

      {title:'SRAM 不足導致大型模型效率遠低於預期', trigger:'選用的 NPU SRAM 無法容納主要 AI 模型的熱點層，頻繁讀取 DDR。', impact:'NPU 實際推論效率遠低於 TOPS 標稱值，E2E Latency 上升。', prevention:'在 NPU 選型時確認 SRAM 大小相對於目標模型的足夠程度（需依實際模型確認）。'}

'6.5': {
  id:'6.5', volume:'VOL 6', volumeTitle:'系統限制', title:'儲存壽命限制（Write Endurance）',
  summary:'eMMC/UFS 的 Write Endurance（TBW）是車輛生命週期可靠性的隱性限制，持續錄影是主要消耗來源。',
  layer:'硬體層',
  content:{
    concept:`儲存壽命限制是所有車載系統設計中最容易被低估的長期可靠性問題。eMMC 和 UFS 使用 NAND Flash 儲存，而 NAND Flash 的每個儲存格有有限的寫入壽命（Program/Erase Cycles）。製造商以 TBW（Total Bytes Written）指標標示儲存裝置在可靠性開始下降前的最大累積寫入量（需依型號查證）。

持續高碼率錄影是 TBW 消耗最快的場景：假設錄影碼率 20 Mbps，每天行駛 2 小時，每年累積寫入量約 18 TB（需計算確認）。低階 eMMC 的 TBW 可能只有 300～600 TB，這意味著可能只有 15～30 年的壽命——看起來夠用，但高碼率（50 Mbps）或多路錄影會成倍加速消耗。

TBW 耗盡前通常沒有明顯的故障預警，儲存裝置可能先出現「靜默錯誤」（資料寫入失敗但不報錯），再逐漸演變為明顯的讀寫失敗。這種「靜默失效」是行車記錄系統的最大可靠性風險。`,
    systemPosition:'儲存壽命限制位於硬體層（NAND Flash 物理特性），影響所有依賴持久化儲存的功能（錄影、OTA、系統資料）。',
    normalFlow:{type:'flow', nodes:['持續錄影寫入', 'NAND Flash P/E 消耗', 'TBW 計數器遞增', '接近 TBW 上限', '靜默錯誤 → 失效']},
    keyTerms:[
      {name:'P/E Cycle', definition:'Program/Erase Cycle，NAND Flash 每個儲存格可執行的寫入/抹除次數上限。', meaning:'超過 P/E Cycle 上限的儲存格變得不可靠，最終導致 TBW 耗盡後整體可靠性下降。', why:'了解 P/E Cycle 有助於理解為什麼高碼率錄影比低碼率更快消耗儲存壽命。'},
      {name:'靜默失效', definition:'儲存裝置壽命耗盡時，寫入失敗但不向系統報告錯誤的失效模式。', meaning:'是行車記錄系統最危險的失效模式——用戶以為在錄影，實際上什麼都沒記錄。', why:'必須設計 TBW 監控和寫入驗證機制，防止靜默失效。'},
      {name:'WAF（Write Amplification Factor）', definition:'Flash 控制器為了執行垃圾回收，實際寫入 NAND 的資料量比應用要求的更多。', meaning:'WAF > 1 意味著實際 TBW 消耗比名義寫入量更快，是 TBW 壽命估算必須考慮的修正因子。', why:'忽略 WAF 會高估儲存壽命，導致產品在保固期內出現失效。'}
    ],
    engineeringPoints:[
      'TBW 壽命估算 = TBW 規格 ÷（每日寫入量 × WAF），需依實際碼率和使用場景計算（需依型號填入 TBW 規格）。',
      '多路錄影的 TBW 消耗速率是單路的倍數，4 路攝影機同時錄影約等於 4× 的壽命消耗速度。',
      '設計壽命監控機制：定期讀取 eMMC/UFS 的 Health Status 指標，在 TBW 達到 80% 時向用戶告警。',
      '儲存分區設計應隔離高頻寫入區（錄影）和低頻寫入區（系統），避免高頻寫入加速系統分區的 Flash 老化。',
      'OTA 更新雖然是大塊寫入，但頻率遠低於錄影，對 TBW 的年度消耗貢獻相對較小。'
    ],
    risks:[
      {title:'行車記錄儀靜默失效，事故後無影像', trigger:'eMMC TBW 耗盡，寫入失敗但未報錯，用戶以為正在錄影。', impact:'交通事故後無影像可查，影響事故責任認定，也可能有產品法律責任。', prevention:'設計 TBW 監控和寫入驗證，TBW 達 80% 告警；確保錄影失敗時向用戶明確提示。'},

  summary:'每個功能的啟用都對系統資源造成可量化的影響，本章說明如何用影響矩陣評估功能組合的可行性。',
  layer:'系統全層',
  content:{
    concept:`功能影響矩陣是評估「開啟一個新功能，系統要付出什麼代價」的分析工具。每個功能對應一組資源需求：DDR BW、NPU TOPS、Thermal Budget、Power、Storage I/O。將所有啟用功能的需求加總，再與系統上限比對，即可判斷組合是否可行。矩陣的核心洞見是非線性效應——兩個功能同時啟用的資源需求，往往高於分別測試的加總，因為存在共享資源的競爭懲罰（QoS 仲裁開銷、Cache 置換等）。`,
    systemPosition:'功能影響矩陣橫跨所有層級，是系統設計的決策工具，用於評估功能組合在 worst-case 場景下的資源可行性。',
    normalFlow:{type:'flow', nodes:['功能清單', '各功能資源需求', '加總＋競爭懲罰', '對比系統上限', '可行 / 需取捨']},
    keyTerms:[
      {name:'資源佔用率', definition:'某功能在特定資源維度上的使用量佔系統上限的百分比。', meaning:'用百分比表示資源消耗，讓不同規格的系統可以用同一套矩陣比較。', why:'是功能可行性評估的核心計算基礎。'},
      {name:'競爭懲罰', definition:'多個功能同時使用共享資源時，因仲裁和等待帶來的額外消耗（通常 10～30%，需依平台量測）。', meaning:'解釋了「單獨測試都通過，一起開就超標」的現象。', why:'功能組合規劃時必須預留競爭懲罰的餘量，否則整合測試必然失敗。'},
      {name:'安全餘量', definition:'系統上限與最壞情況下資源使用量之間保留的緩衝空間，通常建議 20% 以上。', meaning:'防止偶發高峰（高溫 Throttling、突發 DDR 讀寫）導致系統超出邊界。', why:'設計時沒有安全餘量，量產後必然在邊緣場景觸發問題。'}

    engineeringPoints:[
      '功能影響矩陣應在功能規格凍結前完成，此時發現問題的修改成本最低。',
      '矩陣數值應來自實測而非估算——估算通常偏樂觀，實測才能反映競爭懲罰。',
      '矩陣需涵蓋 worst-case 場景（最高解析度 × 最多路數 × 最高算力功能同時啟用）。',
      '「功能使用率」可作為溝通工具，讓 PM 直觀理解某功能佔用了多少系統空間。',
      'Core Models 的 Feature → Impact Mapping（核心模型頁）是此矩陣的簡化互動版本。'
    ],
    risks:[
      {title:'功能組合可行性在整合測試才驗證', trigger:'各功能分開測試通過，整合後才發現資源超載。', impact:'整合測試失敗，需緊急降規或重新設計，影響時程。', prevention:'建立功能影響矩陣並在規格設計階段驗算，而非等待整合測試。'},
      {title:'矩陣更新落後於功能需求變更', trigger:'功能規格調整後，矩陣未同步更新。', impact:'評估結果失效，錯誤的矩陣比沒有矩陣更危險。', prevention:'功能規格任何變更後，矩陣需強制同步更新。'}
    ],
    crossModuleImpact:{

    },
    checkQuestions:['功能影響矩陣解決什麼問題？','競爭懲罰是什麼，為什麼在設計時必須預留？','安全餘量為什麼建議 20% 以上？'],
    related:{chapters:['5.1','7.6','10.2'], modules:['ddr','npu','thermal'], terms:['DDR Bandwidth','TOPS','Thermal Throttling']}
  }

'7.3': {

'7.5': {
  id:'7.5', volume:'VOL 7', volumeTitle:'功能與系統影響',
  title:'OTA 功能上線的風險點',
  summary:'OTA 不只是推送更新，功能上線的每個環節都有影響系統穩定性和功能安全的潛在風險。',

  content:{
    concept:`OTA 功能上線（Feature OTA）與 Bug Fix OTA 的風險層次不同——前者引入全新行為和新的資源消耗，後者修復已知問題。每個透過 OTA 上線的新功能，都需要在部署前完成資源影響評估、功能安全分析（若涉及 ADAS）、回滾計劃設計，以及分批推送策略。常見風險：新功能帶來的 DDR BW 增加讓現有功能超標；新 AI 模型的 Thermal 壓力在高溫季節才顯現；功能安全驗證遺漏導致 OTA 後 ADAS 行為改變但未被發現。`,

    normalFlow:{type:'flow', nodes:['功能上線決策', '資源影響評估', '功能安全分析（ADAS）', '分批推送', '線上監控', '異常回滾']},
    keyTerms:[

      {name:'Safety Impact Analysis', definition:'OTA 更新前評估變更是否影響功能安全的分析流程。', meaning:'ADAS 功能任何更新都必須完成此分析，確認不影響已認證的安全行為。', why:'跳過此分析的 ADAS OTA 可能違反功能安全認證要求。'}
    ],
    engineeringPoints:[
      'OTA 功能上線前必須評估新功能的資源影響——尤其是 DDR BW 和 Thermal，這些影響在特定場景才顯現。',

  content:{
    concept:`DDR（Double Data Rate）記憶體是車載 AI SoC 的共享高速記憶體，所有 SoC 內建模組（ISP、NPU、Encoder、CPU、GPU、Display）的資料讀寫都需要通過 DDR。DDR 的最大頻寬（GB/s）是整個系統的資源上限，超出上限時各模組的效能同時下降。

  layer:'應用框架層 / 應用層',
  content:{
    concept:`感測器融合子系統整合多種感測器的資料，建立對周圍環境更完整、更準確的理解。不同感測器各有特性：Camera 提供豐富的視覺資訊但受光線影響；Radar 能測量速度和距離，不受光線與惡劣天氣影響；LiDAR 提供精確的 3D 點雲但成本高且受雨霧影響。融合多感測器可以互補各自的盲點，提升感知準確度與魯棒性。

感測器融合的核心技術挑戰是時序同步：不同感測器有不同的更新頻率（Camera 30fps / Radar 20fps / LiDAR 10～20fps），在融合時必須將不同時刻採集的資料對齊到同一時間參考點。Timestamp 精度直接影響融合品質，時序不準確會導致動態物體的位置計算出現誤差。

'9.4': {
  id:'9.4', volume:'VOL 9', volumeTitle:'量產與現實限制',
  title:'量產韌體與開發韌體的差異',
  summary:'量產韌體在日誌、除錯工具、安全設定上與開發韌體有根本差異，是量產品質的重要保障也是常見問題來源。',
  layer:'韌體層',
  content:{
    concept:`量產韌體（Production Firmware）與開發韌體（Development / Debug Firmware）的主要差異在於：開發韌體為了除錯，保留了大量日誌輸出、除錯接口（UART / JTAG）、詳細錯誤訊息；量產韌體需要關閉這些除錯機制，啟用 Secure Boot，並移除測試用的後門接口。挑戰在於「在開發韌體上測試通過」不等同於「量產韌體也能通過」——Secure Boot 增加啟動時間、關閉日誌影響效能（有時開發韌體的日誌輸出本身佔用顯著 CPU 資源，需依平台量測）、安全設定可能讓某些功能行為改變。量產韌體需要完整的回歸測試。`,
    systemPosition:'量產韌體 vs 開發韌體的差異存在於韌體層（BSP / Bootloader）和 OS 層（日誌 / 安全設定）。',
    normalFlow:{type:'flow', nodes:['開發韌體（Debug）', '移除除錯接口', '啟用 Secure Boot', '最小化日誌', 'Hardening 安全設定', '量產韌體回歸測試']},
    keyTerms:[
      {name:'Secure Boot', definition:'量產韌體必須啟用的安全啟動機制，驗證數位簽章確保只有授權軟體可以執行。', meaning:'增加少量啟動時間，防止惡意韌體，是 UNECE R155 的要求（需查證細節）。', why:'是開發韌體和量產韌體最重要的差異之一，必須在量產測試中驗證其行為。'},
      {name:'韌體 Hardening', definition:'量產韌體的安全強化過程：關閉不必要的調試接口、最小化系統權限、移除測試後門。', meaning:'提高系統安全性，防止未授權存取，是網路安全法規合規的必要步驟。', why:'Hardening 可能改變系統行為，需要完整回歸測試確認功能未受影響。'},
      {name:'量產回歸測試', definition:'在量產韌體上重新執行所有在開發韌體上驗證過的功能測試案例。', meaning:'確認量產韌體的行為與開發韌體一致，發現因 Hardening 或設定變更引起的功能差異。', why:'跳過回歸測試的量產韌體可能在車輛交付後才發現功能問題。'}

    ],
    risks:[

      {title:'量產韌體功能行為改變但未被發現', trigger:'量產韌體關閉了開發韌體依賴的除錯機制，導致功能行為改變。', impact:'量產車出現開發階段未發現的問題。', prevention:'量產韌體的回歸測試必須覆蓋所有在開發韌體上驗證的功能。'}

  title:'現場問題回饋機制（Field Issue Loop）',
  summary:'Field Issue Loop 是量產後問題發現、診斷、修復、部署的閉環流程，是持續改善量產品質的核心機制。',
  layer:'系統全層',
  content:{
    concept:`量產後不可避免地會出現在開發和測試中未能發現的問題——使用場景的多樣性、環境條件的極端性，以及車隊規模帶來的低概率問題放大效應。Field Issue Loop 是將這些問題系統化處理的流程：問題識別（DTC 故障碼、用戶回報、遠端監控告警）→ 問題診斷（Log 分析、問題重現）→ 修復方案設計和驗證 → OTA 部署修復 → 驗證修復效果。完善的 Field Issue Loop 讓製造商能持續提升量產車的功能品質，也是「軟體定義汽車」模式的核心能力之一。`,
    systemPosition:'Field Issue Loop 跨越應用層（功能問題監控）、韌體層（Log 收集）、通訊層（資料回傳）和 OTA（修復部署）。',

    concept:`電源管理子系統負責將整車 12V（或高壓電動車電池電源）轉換為各模組所需的精確電壓，並管理各模組的供電時序與功耗。核心元件是 PMIC（Power Management IC），它輸出多路電源軌，分別為 SoC、DDR、儲存、通訊模組等提供穩定的供電。

'4.1': {
  id:'4.1', volume:'VOL 4', volumeTitle:'資料流與 Pipeline', title:'完整資料流地圖',
  summary:'從感測器輸入到執行器輸出，AI 車載系統的完整資料流全景，各條 Pipeline 的組成與關係。',
  layer:'系統全層',
  content:{
    concept:`AI 車載系統的資料流可以理解為多條並行運作的 Pipeline，每條 Pipeline 負責不同的功能需求，但共享同一個 DDR 頻寬池與 SoC 計算資源。

'4.5': {
  id:'4.5', volume:'VOL 4', volumeTitle:'資料流與 Pipeline', title:'OTA 資料流（空中更新路徑）',
  summary:'從雲端 OTA Server 到車輛端韌體更新完成的完整空中更新資料流，是「軟體定義汽車」的核心能力。',
  layer:'應用層 / 通訊層 / 韌體層',
  content:{
    concept:`OTA（Over-The-Air）更新讓車輛軟體可以在不需要進廠的情況下遠端升級，是現代車輛的核心能力之一。OTA 資料流涵蓋從雲端 OTA Server 到車輛端完成更新的完整過程：更新包下載（透過 LTE/WiFi）、本地驗證（數位簽章）、寫入備用分區（A/B 分區設計）、Bootloader 切換分區、更新後驗證。

車載 OTA 的複雜度遠超手機 OTA，原因有三：(1) 安全性——更新失敗不能讓車輛無法啟動（需要可靠的回滾機制）；(2) 功能安全——ADAS 功能的軟體修改需要符合 ISO 26262 的安全變更流程；(3) 多樣性——一次 OTA 可能需要更新多個 ECU（包含非 SoC 的獨立 ECU），協調複雜度高。`,
    systemPosition:'OTA 資料流跨越應用層（OTA Manager）、通訊層（網路傳輸）、韌體層（Bootloader 切換）三個層級，是系統中最跨層的功能之一。',
    normalFlow:{type:'flow', nodes:['OTA Server', 'Network（WiFi/LTE）', 'Storage（B 分區）', 'Bootloader', '更新完成 / 回滾']},
    keyTerms:[
      {name:'A/B 分區', definition:'OTA 使用兩個完整的系統分區，更新時在備用（B）分區安裝，確認後才切換到 B 分區運行。', meaning:'A/B 分區設計確保更新失敗時可以自動回滾到舊版本（A 分區），防止磚機。', why:'了解 A/B 分區有助於評估 OTA 可靠性設計的完整性。'},
      {name:'Delta Update', definition:'增量更新，只傳輸新舊版本的差異部分，而非完整更新包。', meaning:'顯著減少下載量，對 LTE 網路頻寬有限的場景特別有用。', why:'Delta Update 是大規模 OTA 部署的重要優化技術，了解它有助於評估 OTA 架構的成熟度。'},
      {name:'Secure Boot', definition:'Bootloader 在載入 OS 前驗證軟體的數位簽章，確保只有授權的軟體才能運行。', meaning:'OTA 更新的安全性基礎，防止惡意軟體透過偽造 OTA 包被安裝到車輛。', why:'Secure Boot 是 UNECE R155（車輛網路安全法規）的基本要求，是 OTA 安全設計的基礎。'}
    ],

'4.7': {
  id:'4.7', volume:'VOL 4', volumeTitle:'資料流與 Pipeline', title:'Pipeline 失效行為',
  summary:'Drop / Fallback / Freeze——Pipeline 在資源不足或故障時的降級行為，以及如何設計安全的失效響應機制。',
  layer:'系統全層',
  content:{
    concept:`Pipeline 失效不是非常或關機，而是在資源不足或部分故障時系統採取的降級行為。三種主要的失效行為模式：

Drop（丟幀/丟棄）：資源不足時，系統主動丟棄部分資料幀以維持整體資料流的進行。例如 AI 感知 Pipeline 在 DDR BW 超載時跳過部分幀的推論，確保不積壓影響後續幀的處理。

Fallback（降級）：切換到功能較低但資源消耗也較低的替代模式。例如 Thermal Throttling 時，NPU 降頻繼續推論，但延遲增加；或在某路攝影機故障時，ADAS 自動切換到單感測器模式繼續工作。

Freeze（凍結/停止）：系統進入不可恢復的失效狀態，功能停止並觸發安全機制。這應是最後手段，設計上需確保在任何 Freeze 情況下車輛仍能安全停車（Fail-Safe 設計）。`,
    systemPosition:'Pipeline 失效行為設計跨越所有系統層級，是功能安全（ISO 26262）設計的核心工作。',
    normalFlow:{type:'flow', nodes:['正常運行', 'Drop（丟幀）', 'Fallback（降級）', 'Freeze（停止）', 'Fail-Safe（安全狀態）']},
    keyTerms:[
      {name:'Fail-Safe', definition:'系統在發生故障時自動進入安全狀態的設計，確保失效不會導致危害。', meaning:'不是「系統不會壞」，而是「系統壞掉時不會造成危害」。安全狀態通常是減速、靠邊停車或提示駕駛接管。', why:'Fail-Safe 是 ADAS 功能安全設計的底線，是 ISO 26262 的核心要求之一。'},
      {name:'Graceful Degradation', definition:'系統在部分故障時以有限功能繼續運行，而非完全停止，的降級設計策略。', meaning:'讓使用者在故障情況下仍有有限功能可用（如部分 ADAS 功能仍工作），提升系統可用性。', why:'了解 Graceful Degradation 有助於評估 ADAS 系統的健壯性設計。'},
      {name:'Watchdog', definition:'系統健康監控機制，若主要任務長時間沒有「餵狗」（按時回報），則觸發系統復位。', meaning:'防止系統進入不可知的死鎖或無響應狀態而不自知，是嵌入式系統可靠性設計的標配。', why:'Watchdog 是系統可靠性設計的基礎元素，了解它有助於評估系統的故障偵測能力。'}
    ],
    engineeringPoints:[
      'Drop 策略需要明確定義哪些資料幀可以被丟棄，原則是「保護安全關鍵 Pipeline，犧牲非安全功能」。',
      'Fallback 模式需要預先定義好降級後的功能邊界，讓系統知道在降級模式下能提供什麼保障。',
      'Freeze / Fail-Safe 的觸發條件需要謹慎定義，誤觸發可能造成不必要的 ADAS 功能中斷。',
      '失效行為的設計需要與功能安全工程師和 ADAS 功能負責人共同確認，確保降級策略符合安全需求。',
      '所有失效事件需要有完整的 Log 記錄機制，供事後分析與 OTA 改善使用。'
    ],
    risks:[
      {title:'Fail-Safe 觸發條件設計過於保守', trigger:'微小的感測器雜訊或短暫 DDR BW 波動觸發 Fail-Safe，系統不必要地中斷。', impact:'ADAS 功能頻繁中斷，用戶體驗嚴重受損，且可能造成實際行駛風險。', prevention:'Fail-Safe 觸發條件需要有合理的「消抖」機制，避免瞬時故障觸發 Fail-Safe。'},
      {title:'Fallback 模式未經充分測試', trigger:'Fallback 模式路徑在開發期間測試不足，實際觸發時行為不符預期。', impact:'降級後系統行為不可預測，可能比直接 Freeze 更危險。', prevention:'Fallback 模式需要與正常模式一樣完整地進行功能安全測試。'}
    ],
    crossModuleImpact:{
      upstream:['資源超載（DDR/Thermal/算力）','硬體故障（感測器/ECU）'],
      downstream:['ADAS 功能可用性','用戶安全感知','OEM 功能安全合規'],
      shared:['Watchdog 機制（各層均需實作）']
    },
    checkQuestions:['Drop、Fallback、Freeze 三種失效行為各適用什麼情境？','Fail-Safe 設計的核心原則是什麼？','為什麼 Fallback 模式需要像正常模式一樣測試？','Watchdog 在 Pipeline 失效防護中扮演什麼角色？'],
    related:{chapters:['4.1','4.2','6.1','6.3'], modules:['npu','isp','rtos'], terms:['Latency','Thermal Throttling','ISO 26262']}

  summary:'提升效能幾乎必然增加功耗與發熱，理解此取捨框架是 SoC 選型與功能設計決策的基礎。',

'8.3': {
  id:'8.3', volume:'VOL 8', volumeTitle:'產品決策與取捨',
  title:'延遲 vs 精度 取捨框架',
  summary:'AI 模型的推論延遲和辨識精度往往相互制約，在有限算力下「要更準」和「要更快」不能兼得。',
  layer:'SoC 硬體層 / 應用層',
  content:{
    concept:`更高精度的 AI 模型通常更大（更多參數），推論時間更長（更多 TOPS 消耗）。在有限的算力和延遲預算下，精度和速度往往不能兼得。ADAS 功能通常對延遲有嚴格的安全閾值（E2E Latency 要求），精度要求由功能安全需求決定（漏報率 / 誤報率上限）。當兩者衝突時，通常延遲優先——一個「稍差一點」的模型及時反應，比一個「精度更高」但延遲超標的模型更安全。`,
    systemPosition:'延遲 vs 精度取捨在應用框架層（AI Runtime 排程）和應用層（ADAS 功能設計）發生，受 NPU 硬體層（TOPS/DDR BW）約束。',
    normalFlow:{type:'flow', nodes:['精度需求', '模型大小 / 複雜度', 'TOPS 消耗', 'DDR BW 消耗', 'E2E Latency', '是否符合安全閾值？']},
    keyTerms:[
      {name:'漏報率（False Negative）', definition:'應偵測到但未偵測到的情況比率，在 ADAS 中對應「未發現威脅」。', meaning:'漏報率過高是 ADAS 安全隱患的主要來源，是精度需求的核心指標。', why:'是平衡延遲 vs 精度時，精度側的主要評估指標。'},
      {name:'INT8 量化', definition:'將浮點模型壓縮為 8-bit 整數，大幅降低算力需求但精度略降。', meaning:'量化是解決延遲 vs 精度取捨的主要工程手段，可在損失少量精度的前提下降低延遲。', why:'了解量化有助於評估「在可接受精度損失下，最多可以縮短多少延遲」（需逐模型驗測）。'},
      {name:'模型蒸餾', definition:'用大型模型指導訓練小型模型，讓小模型在較少參數下接近大模型的精度。', meaning:'是在有限算力下提升模型精度效率的進階技術。', why:'了解蒸餾有助於評估「能否在不增加算力的情況下提升 AI 精度」。'}
    ],
    engineeringPoints:[
      '在 ADAS 系統中，當精度和延遲無法兼顧時，通常延遲優先——及時的反應比精準但延遲的反應更安全。',
      'INT8 量化通常可降低推論延遲，但精度損失需逐模型驗測（需依實際模型確認具體比例）。',
      '模型蒸餾讓小模型接近大模型精度，是算力受限下提升精度的首選技術路線。',
      '延遲預算需在系統架構設計時由各模型分配，而非在模型訓練後才發現超標。',
      '不同 ADAS 功能的精度要求不同——行人偵測漏報的安全後果通常高於車道線偵測。'
    ],
    risks:[
      {title:'AI 模型精度提升計劃導致 E2E Latency 超標', trigger:'為提升精度更換更大的模型，但未評估對延遲的影響。', impact:'ADAS 功能安全測試失敗，大模型反而讓系統更不安全。', prevention:'每次模型升級前同步評估延遲影響，確保 E2E 仍在安全閾值內。'},
      {title:'量化後精度損失超出功能安全要求', trigger:'INT8 量化導致特定場景下漏報率超過功能安全規格上限。', impact:'量化後的模型無法通過功能安全驗證，需重新設計。', prevention:'每個模型量化後都需要完整的精度回歸測試，確認漏報率符合需求。'}
    ],
    crossModuleImpact:{
      upstream:['NPU TOPS 餘量','DDR BW 餘量'],
      downstream:['ADAS 安全功能合規性','AI 辨識準確率'],
      shared:['NPU TOPS（精度 vs 速度的算力消耗）']
    },
    checkQuestions:['延遲和精度取捨中，ADAS 場景通常優先哪個？','INT8 量化如何幫助解決延遲 vs 精度取捨？','漏報率為什麼是精度評估的核心指標？'],
    related:{chapters:['3.2','5.2','6.3'], modules:['npu'], terms:['TOPS','Latency','DDR Bandwidth']}
  }
},

'8.4': {
  id:'8.4', volume:'VOL 8', volumeTitle:'產品決策與取捨',
  title:'靈活性 vs 整合度 取捨框架',
  summary:'高度整合的 SoC 方案節省成本但靈活性低，分散模組化方案靈活但複雜且成本高，選擇需依產品定位決定。',
  layer:'系統架構層',
  content:{
    concept:`靈活性 vs 整合度是系統架構的核心取捨：整合度高的方案（如 ADAS + Cockpit 整合在同一顆 SoC）可以降低 BOM 成本、減少 PCB 面積，但靈活性低；分散方案讓每個功能域使用獨立硬體，靈活性高（可以單獨升級或替換一個域），但總 BOM 成本更高、軟體整合複雜度增加。Domain Controller 代表向高整合度演進的方向，要求在系統架構設計時充分考慮功能安全隔離和未來擴展性。`,
    systemPosition:'靈活性 vs 整合度取捨在系統架構設計階段決定，影響 SoC 選型、Hypervisor 設計、功能安全邊界劃定。',
    normalFlow:{type:'flow', nodes:['功能域清單', '整合 vs 分散決策', 'SoC 選型（單 / 多顆）', 'Hypervisor 設計', '功能安全邊界']},
    keyTerms:[
      {name:'Domain Controller 整合', definition:'將多個功能域（ADAS + Cockpit）整合在同一套硬體平台上。', meaning:'降低 BOM 成本，但需要更嚴格的功能安全隔離設計。', why:'了解整合方案的取捨有助於評估域控產品定位是否合理。'},
      {name:'功能安全隔離', definition:'在同一 SoC 上確保低安全等級功能不影響高安全等級功能的設計機制。', meaning:'Hypervisor 是功能安全隔離的主要技術手段，將 ADAS（高 ASIL）和 Cockpit（低 ASIL）隔離。', why:'整合度越高，功能安全隔離設計的重要性越高。'},
      {name:'認證範圍', definition:'功能安全認證需要覆蓋的系統範圍，整合方案的認證範圍通常比分散方案更大。', meaning:'整合在同一 SoC 的功能越多，認證範圍擴大，認證成本和複雜度上升。', why:'認證範圍是評估整合方案真實成本的重要因素，容易被低估。'}
    ],
    engineeringPoints:[
      'ADAS 和 Cockpit 整合在同一 SoC 時，功能安全認證範圍擴大，認證成本可能顯著上升。',
      'Hypervisor 是高整合度方案的功能安全保障，但也引入性能開銷（需依實際平台量測）。',
      '整合度越高，硬體升級靈活性越低——換一個功能的硬體可能影響整個系統。',
      '分散方案（多顆 SoC）允許各功能域獨立升級，但整體 BOM 成本更高。',
      '未來 OTA 的靈活性也受整合度影響——高整合方案的 OTA 需協調更多模組的版本相容性。'
    ],
    risks:[
      {title:'高整合方案的功能安全認證成本被低估', trigger:'ADAS + Cockpit 整合後，認證範圍擴大到整個 SoC，成本超出預算。', impact:'項目預算不足，認證進度延遲，影響量產時程。', prevention:'整合方案設計前估算完整的功能安全認證成本，並諮詢認證機構。'},
      {title:'Hypervisor 隔離設計不足導致安全功能受影響', trigger:'Hypervisor 的資源分區設計不當，Cockpit 高負載時影響 ADAS 分區的即時性。', impact:'ADAS 功能在 Cockpit 高負載場景下出現延遲，功能安全測試失敗。', prevention:'Hypervisor 資源分區設計由功能安全工程師審核，ADAS 分區需有靜態資源保障。'}
    ],
    crossModuleImpact:{
      upstream:['整車系統架構設計'],
      downstream:['SoC 選型','功能安全認證策略','OTA 靈活性'],
      shared:['功能安全資源（整合方案需要更多安全設計）']
    },
    checkQuestions:['高整合度方案的主要優點和風險是什麼？','Hypervisor 在整合方案中扮演什麼角色？','為什麼整合度高會增加功能安全認證成本？'],
    related:{chapters:['1.4','2.3','9.1'], modules:['hypervisor','soc','domain-ctrl'], terms:['Hypervisor','ISO 26262','Domain Controller']}
  }

'8.5': {
  id:'8.5', volume:'VOL 8', volumeTitle:'產品決策與取捨',
  title:'平台複用 vs 客製化 取捨框架',
  summary:'平台複用降低開發成本但功能受限，客製化提升差異化但成本和週期大幅上升，是產品戰略的核心決策。',
  layer:'系統架構層',
  content:{
    concept:`平台複用（使用既有的 SoC 平台和軟體框架）與客製化（針對特定需求設計專屬硬體或算法）之間的取捨，是車載產品戰略的核心。平台複用的優勢是縮短開發時程、降低開發風險、節省工程成本；客製化的優勢是更高的差異化競爭力、更精準的資源利用效率。在車載 AI 系統中，SoC 平台選型本身就是最重要的平台複用 vs 客製化決策，而軟體客製化（AI 算法、ISP Tuning）是在平台複用框架下提升差異化的最常見低成本手段。`,
    systemPosition:'平台複用 vs 客製化取捨在系統架構設計最早期做出，影響所有後續技術決策。',
    normalFlow:{type:'flow', nodes:['需求分析', '主流平台評估', '差距分析（Gap Analysis）', '複用 vs 客製化決策', '開發週期 / 成本影響']},
    keyTerms:[
      {name:'SoC 平台生態', definition:'SoC 廠商提供的配套資源：BSP、SDK、AI 工具鏈、參考設計、認證支援。', meaning:'豐富的平台生態大幅降低開發初期的工程工作量，是平台複用的主要收益。', why:'評估是否採用某 SoC 平台時，需評估其生態成熟度，不只是技術規格。'},
      {name:'Gap Analysis', definition:'評估既有平台與產品需求之間的差異，確定哪些部分需要客製化。', meaning:'是決定複用 vs 客製化程度的主要工具，幫助識別「不客製化則無法接受」的關鍵差距。', why:'未做充分 Gap Analysis 而盲目採用主流平台，可能在開發中期才發現根本無法滿足需求。'},
      {name:'軟體客製化', definition:'在平台複用基礎上，針對特定需求開發差異化的軟體（AI 算法、ISP Tuning、決策邏輯）。', meaning:'成本遠低於硬體客製化，是差異化的首選路線。', why:'了解軟體客製化的邊界，有助於在平台複用和差異化之間找到最佳平衡。'}
    ],
    engineeringPoints:[
      'SoC 平台的車規認證支援程度（是否有 ASIL 認證的 IP 核心）是選型的重要評估維度。',
      '客製化 AI 模型（而非客製化 SoC）是在平台複用框架下提升差異化的最常見方式。',
      '過度複用主流平台可能導致產品功能與競品高度同質化，缺乏差異化競爭優勢。',
      '客製化 SoC（ASIC）的開發成本和週期通常以億元和年為單位，適合大規模量產的特定場景。',
      '軟體客製化（AI 算法、ISP Tuning）的成本遠低於硬體客製化，是差異化的首選路線。'
    ],
    risks:[
      {title:'過度依賴主流平台導致產品缺乏差異化', trigger:'完全複用平台的 AI 模型和軟體框架，競品採用相同平台時功能幾乎無差異。', impact:'失去市場差異化優勢，競爭轉向純價格競爭。', prevention:'在平台複用基礎上，識別可以進行軟體客製化（AI 算法 / ISP Tuning）的差異化空間。'},
      {title:'客製化程度超出工程能力導致時程延誤', trigger:'低估客製化的技術難度和工程工作量，設定了過於激進的時程。', impact:'時程嚴重延誤，影響市場窗口。', prevention:'客製化決策前充分評估工程能力，不足時尋求外部合作或縮小客製化範圍。'}
    ],
    crossModuleImpact:{

      downstream:['SoC 選型','開發時程','軟體技術棧'],
      shared:['工程資源（複用 vs 客製化的工程投入競爭）']
    },
    checkQuestions:['平台複用的主要優勢是什麼？','Gap Analysis 在取捨框架中的作用是什麼？','為什麼軟體客製化通常優先於硬體客製化？'],
    related:{chapters:['8.2','9.2','1.4'], modules:['soc','bsp'], terms:['SoC','BSP']}
  }

'8.6': {
  id:'8.6', volume:'VOL 8', volumeTitle:'產品決策與取捨',
  title:'標準化決策流程（Decision Flow）',
  summary:'將功能取捨、架構決策、資源評估標準化為可重複使用的決策流程，是提升產品決策品質的組織能力。',
  layer:'系統架構層',
  content:{
    concept:`標準化決策流程是將上述各取捨框架（效能 vs 功耗、成本 vs 功能密度、延遲 vs 精度等）整合為可操作的決策步驟，確保每個重要決策都有完整的評估和文件化。一個好的決策流程包含：明確的決策觸發條件、需要評估的維度清單、利害關係人確認步驟，以及決策後的監控機制。標準化的重要性在於讓不同工程師做相同類型的決策時遵循一致的評估框架，同時形成可追溯的決策記錄。`,
    systemPosition:'標準化決策流程是組織層面的工具，應用於所有產品設計階段的重要技術決策，橫跨所有系統層級。',
    normalFlow:{type:'flow', nodes:['決策需求識別', '評估維度確認', '利害關係人輸入', 'Trade-off 分析', '決策文件化', '後續監控']},
    keyTerms:[
      {name:'決策閘門（Decision Gate）', definition:'在產品開發里程碑設置的強制性決策確認點，確保關鍵決策有完整評估。', meaning:'在設計凍結、硬體確認、DVT 等關鍵節點設置，防止帶著未解決的決策問題進入下一階段。', why:'決策閘門是確保標準化流程被實際執行的組織機制。'},
      {name:'Trade-off 文件', definition:'記錄取捨決策的文件，包含評估的選項、各維度的得失分析和最終選擇理由。', meaning:'是決策可追溯性的基礎，也是新成員理解現有設計決定的重要知識傳承文件。', why:'缺乏 Trade-off 文件的決策在人員流動後往往無法解釋，導致歷史問題重複發生。'},
      {name:'影響範圍評估', definition:'評估某個決策變更對其他模組和功能的連鎖影響範圍。', meaning:'防止「局部最優但全局次優」的決策——某個模組最好的選擇，可能對整體系統造成不良影響。', why:'影響範圍評估是標準化流程中防止意外連鎖效應的關鍵步驟。'}
    ],
    engineeringPoints:[
      '標準化流程的價值在一致性，而非流程本身的完美——執行不完美的流程比沒有流程好。',
      'Vol.10.4（Trade-off 對照表）和 Vol.10.5（PM/RD 溝通問題集）是此流程的輔助工具。',
      '決策文件化應在決策後立即完成，而非事後補寫——事後補寫的文件往往美化決策過程。',
      '標準化流程應定期回顧——量產後出現的問題，往往是對流程盲點的最好回饋。',
      '不是所有決策都需要完整走流程——應依決策的影響範圍和不可逆程度調整嚴格程度。'
    ],
    risks:[

const glossary = [
  { id: 'soc', term: 'SoC', category: '硬體架構', definition: '將 CPU、NPU、ISP、GPU、記憶體控制器等多個 IP 核心整合於單一晶片的系統單晶片。', engineeringMeaning: '整合設計降低模組間通訊延遲、縮小 PCB 面積、降低功耗，是現代車載 AI 平台的算力核心。', commonMisunderstanding: '許多人以為 SoC 就是 CPU，實際上 NPU 算力往往遠超 CPU，ISP 影像處理能力也是獨立硬體模組。', relatedChapters: ['1.1', '2.1'], relatedModules: ['soc', 'npu', 'isp', 'cpu'] },
  { id: 'mcu', term: 'MCU', category: '硬體架構', definition: '微控制器，整合 CPU 核心、少量記憶體與周邊介面的低功耗嵌入式控制器，算力遠低於 SoC。', engineeringMeaning: '適合安全監控、Watchdog、低速控制等任務；車載系統中通常作為安全監控副處理器與 SoC 配合使用。', commonMisunderstanding: '以為 MCU 就是 SoC 的低配版，實際上兩者使用場景完全不同，MCU 強調確定性與超低功耗而非算力。', relatedChapters: ['1.1', '2.2'], relatedModules: ['mcu', 'ecu-mod'] },
  { id: 'mpu', term: 'MPU', category: '硬體架構', definition: '微處理器，算力介於 MCU 與高階 SoC 之間，通常搭配外掛記憶體，用於中階應用。', engineeringMeaning: '相比 MCU 算力更強，但不像 SoC 整合 NPU/ISP 等 AI 加速器；適合不需要 AI 推論的中階控制應用。', commonMisunderstanding: '以為 MPU 就是「便宜的 SoC」，實際上 MPU 缺乏 SoC 的 AI 加速與影像處理能力。', relatedChapters: ['1.1', '2.1'], relatedModules: ['mpu', 'ecu-mod'] },
  { id: 'ecu', term: 'ECU', category: '系統架構', definition: 'Electronic Control Unit，車輛電子控制單元，泛指所有負責特定功能的嵌入式控制器。', engineeringMeaning: '傳統車有 70～100 個 ECU，現代趨勢是整合為少數 Domain Controller；每個 ECU 都需符合對應的 AEC-Q 車規標準。', commonMisunderstanding: '以為 ECU 是「行車電腦」的代稱，實際上剎車、車窗、座椅、雨刷都有各自的 ECU。', relatedChapters: ['1.1', '1.4'], relatedModules: ['ecu-mod', 'mcu'] },
  { id: 'domain-controller', term: 'Domain Controller', category: '系統架構', definition: '域控制器，整合特定功能域（ADAS / Cockpit）多個 ECU 功能的高算力計算平台。', engineeringMeaning: '取代分散式 ECU 架構，降低線束成本、減少通訊延遲，核心是高性能 AI SoC；是汽車電子架構演進的主流方向。', commonMisunderstanding: '以為 Domain Controller 只是更大的 ECU，實際上它整合了原本需要 10～20 個 ECU 才能完成的功能，架構複雜度大幅提升。', relatedChapters: ['1.4'], relatedModules: ['domain-ctrl', 'soc'] },
  { id: 'cpu', term: 'CPU', category: '硬體架構', definition: 'Central Processing Unit，通用處理器，負責 OS 執行、系統控制與各模組協調。', engineeringMeaning: '在 SoC 中，CPU 負責非加速運算的通用邏輯；AI 推論由 NPU 加速，影像處理由 ISP 加速，CPU 是協調與控制中心。', commonMisunderstanding: '以為 AI 系統效能主要取決於 CPU，實際上 NPU 算力才是 AI 推論效能的決定因素，CPU 效能影響系統調度與控制邏輯。', relatedChapters: ['2.1', '2.3'], relatedModules: ['cpu', 'soc', 'npu'] },
  { id: 'gpu', term: 'GPU', category: '硬體架構', definition: 'Graphics Processing Unit，圖形處理器，負責 2D/3D 圖形渲染、HMI 介面繪製。', engineeringMeaning: '車載 GPU 主要用於 Cockpit HMI 渲染，部分場景也用於 AI 推論的輔助加速；GPU 大量使用 DDR BW 是系統設計的考量點。', commonMisunderstanding: '以為車載 GPU 主要用來跑 AI，實際上車載 AI 主要由 NPU 負責，GPU 的核心用途是 HMI 圖形渲染。', relatedChapters: ['3.5'], relatedModules: ['gpu', 'display', 'ddr'] },
  { id: 'npu', term: 'NPU', category: 'AI 系統', definition: 'Neural Processing Unit，神經網路處理器，車載 AI 推論的硬體加速核心。', engineeringMeaning: '相比 CPU 執行 AI 模型，NPU 可提供數十倍的效能與能效比；算力以 TOPS（Tera Operations Per Second）衡量，受 DDR BW 與 Thermal 限制。', commonMisunderstanding: '以為 TOPS 越高就一定越快，實際上 NPU 實際效能受 DDR BW、模型格式、量化精度影響，理論 TOPS 與實際效能可能差距 30～50%（需查證）。', relatedChapters: ['3.2', '5.2'], relatedModules: ['npu', 'ddr', 'soc'] },
  { id: 'dsp', term: 'DSP', category: '硬體架構', definition: 'Digital Signal Processor，數位訊號處理器，針對音訊、雷達等訊號運算高度優化的處理器。', engineeringMeaning: '相比通用 CPU，DSP 執行訊號處理算法的效能和功效比更高，常用於語音識別前處理、雷達訊號處理。', commonMisunderstanding: '以為 DSP 就是音效處理器，實際上車載 DSP 也廣泛用於雷達訊號、感測器資料前處理。', relatedChapters: ['3.2', '3.8'], relatedModules: ['dsp', 'npu', 'sensor-fusion'] },
  { id: 'bsp-term', term: 'BSP', category: '韌體層', definition: 'Board Support Package，針對特定硬體板卡的底層驅動套件。', engineeringMeaning: 'BSP 是 OS 與硬體之間的橋樑，由 SoC 廠商或電路板設計者維護；BSP Bug 是「隨機崩潰」最常見的根本原因之一。', commonMisunderstanding: '以為 BSP 只是「一包驅動」，實際上 BSP 包含了 DDR 初始化、時鐘配置、電源時序等影響整個系統行為的底層設定。', relatedChapters: ['2.2'], relatedModules: ['bsp', 'bootloader'] },
  { id: 'driver-term', term: 'Driver', category: '韌體層', definition: 'OS Kernel 用來控制特定硬體模組的軟體模組，提供硬體抽象介面給上層軟體使用。', engineeringMeaning: 'Driver 版本與 Kernel 版本高度耦合，升級 Kernel 通常需要同步更新 Driver；Driver Bug 可能導致特定硬體模組失效。', commonMisunderstanding: '以為 Driver 是一次性工作，安裝後就不用管。實際上每次 Kernel 升級都可能需要同步更新 Driver，是長期維護的持續工作。', relatedChapters: ['2.2', '2.6'], relatedModules: ['driver', 'bsp'] },
  { id: 'bootloader-term', term: 'Bootloader', category: '韌體層', definition: '系統上電後最先執行的程式，負責硬體初始化、Secure Boot 驗證與 OS 載入。', engineeringMeaning: '啟動時間直接影響後視鏡等功能的法規合規性；Bootloader 損壞是最難救援的故障類型，量產設計必須考慮 Recovery Mode。', commonMisunderstanding: '以為 Bootloader 只是「開機用的小程式，不重要」。實際上 Bootloader 損壞可能讓整台車無法啟動，是系統安全設計的第一道關卡。', relatedChapters: ['2.2', '4.5'], relatedModules: ['bootloader', 'bsp', 'ota'] },
  { id: 'rtos-term', term: 'RTOS', category: 'OS 層', definition: 'Real-Time Operating System，即時作業系統，提供確定性任務執行時序保證。', engineeringMeaning: '確保 ADAS 安全關鍵任務在規定時間內完成，無論系統負載如何；任務優先序設計是 RTOS 應用的核心工程課題。', commonMisunderstanding: '以為「即時」表示「很快」，實際上「即時」是指「確定性」——RTOS 的目標是保證任務在 Deadline 內完成，而非最快完成。', relatedChapters: ['2.3'], relatedModules: ['rtos', 'hypervisor'] },
  { id: 'linux-term', term: 'Linux', category: 'OS 層', definition: '開源作業系統，在車載系統中承載 AI Runtime、媒體框架與 Cockpit 應用的執行環境。', engineeringMeaning: '提供豐富的軟體生態，但非即時 OS；通常與 RTOS 透過 Hypervisor 並行運行，Linux 承載體驗功能，RTOS 承載安全關鍵功能。', commonMisunderstanding: '以為 Linux 不適合車載因為不穩定。實際上現代車載 Linux 有嚴格的版本管理與長期支援（LTS），穩定性很高，問題是「非即時性」而非不穩定。', relatedChapters: ['2.3', '2.6'], relatedModules: ['linux', 'hypervisor', 'rtos'] },
  { id: 'hypervisor-term', term: 'Hypervisor', category: 'OS 層', definition: '虛擬機器監控程式，讓多個 OS 在同一 SoC 上獨立且安全地並行運行。', engineeringMeaning: '在車載系統中，Hypervisor 實現 ADAS（RTOS）與 Cockpit（Android）的資源隔離，防止非安全域影響安全域，是功能安全架構的關鍵技術。', commonMisunderstanding: '以為 Hypervisor 只是「讓多個 OS 一起跑的工具」，實際上車載 Hypervisor 的核心價值是安全隔離，確保 Cockpit 故障不會擴散到 ADAS 域。', relatedChapters: ['2.3'], relatedModules: ['hypervisor', 'rtos', 'linux'] },
  { id: 'mipi', term: 'MIPI', category: '介面協定', definition: 'Mobile Industry Processor Interface，攝影機感測器與 SoC ISP 之間的高速序列介面標準（CSI-2 用於輸入，DSI 用於輸出）。', engineeringMeaning: 'MIPI CSI-2 的 lane 數量決定攝影機資料輸入的頻寬上限，是影像系統設計的硬性約束；lane 數不足無法透過軟體解決。', commonMisunderstanding: '以為 MIPI 只影響「連接方式」。實際上 MIPI lane 數是物理限制，直接決定可支援的攝影機路數與解析度上限。', relatedChapters: ['3.1', '5.4'], relatedModules: ['camera', 'isp', 'display'] },
  { id: 'serdes-term', term: 'SerDes', category: '介面協定', definition: 'Serializer/Deserializer，將多路並行資料序列化為單對差分訊號傳輸，解決車廂內攝影機長距離連接問題。', engineeringMeaning: '支援 15 公尺以上傳輸距離，大幅減少走線數量與重量；GMSL（ADI）與 FPD-Link（TI）是主流車載方案，兩者不相容。', commonMisunderstanding: '以為 SerDes 只是「連接線問題」。實際上 SerDes 方案選擇鎖定攝影機模組供應鏈，是系統選型時影響最廣的早期決策之一。', relatedChapters: ['3.1'], relatedModules: ['camera', 'isp'] },
  { id: 'isp-term', term: 'ISP', category: '影像系統', definition: 'Image Signal Processor，將感測器 RAW 資料處理為 YUV/RGB 可用影像的硬體處理器。', engineeringMeaning: '影像品質由 ISP 硬體能力與 ISP Tuning 參數共同決定；每換一款感測器都需重新進行 ISP Tuning，通常需要數週時間。', commonMisunderstanding: '以為影像品質主要取決於鏡頭和感測器。實際上 ISP Tuning 對影像品質的影響程度不亞於硬體規格，差的 Tuning 可以讓好感測器表現很差。', relatedChapters: ['3.1', '5.3'], relatedModules: ['isp', 'camera', 'ddr'] },
  { id: 'tops-term', term: 'TOPS', category: 'AI 系統', definition: 'Tera Operations Per Second，AI 推論加速器的算力衡量單位。', engineeringMeaning: '衡量 NPU 的理論算力峰值；實際可用算力受 DDR BW、模型格式（INT8/FP16）、記憶體對齊等因素影響，通常低於標稱值（需依實際平台量測）。', commonMisunderstanding: '直接用 TOPS 跨廠商比較是不公平的，因為各家對「1 次 Operation」的定義不同，INT8 與 FP16 的 TOPS 也無法直接比較。', relatedChapters: ['3.2', '5.2'], relatedModules: ['npu', 'soc'] },
  { id: 'ddr-bw', term: 'DDR Bandwidth', category: '記憶體系統', definition: 'DDR 記憶體每秒可傳輸的資料量（GB/s），是 SoC 所有模組共享的頻寬池。', engineeringMeaning: '是車載 AI 系統最常見的系統瓶頸，所有模組（ISP/NPU/Encoder/CPU）都在競爭這個共享資源；超載時各模組效能同時下降。', commonMisunderstanding: '以為「加大 DDR 容量（GB）」可以解決效能問題。DDR 瓶頸在頻寬（GB/s 傳輸速率）而非容量，增加容量無法提升頻寬。', relatedChapters: ['3.4', '5.1'], relatedModules: ['ddr', 'npu', 'isp', 'encoder'] },
  { id: 'axi-bus', term: 'AXI Bus', category: '系統架構', definition: 'Advanced eXtensible Interface，ARM 定義的 SoC 片上高速資料匯流排標準，連接各 IP 核心與 DDR 控制器。', engineeringMeaning: 'SoC 內部各模組（ISP/NPU/CPU）透過 AXI Bus 存取 DDR，Bus 頻寬設計直接影響各模組的資料吞吐能力。', commonMisunderstanding: '以為 AXI Bus 只是內部的連接線，不影響效能。實際上 AXI Bus 的頻寬設計決定了 SoC 內部資料搬移的速度上限。', relatedChapters: ['3.4', '5.1'], relatedModules: ['ddr', 'soc'] },
  { id: 'qos', term: 'QoS', category: '系統架構', definition: 'Quality of Service，在 SoC DDR 控制器中為各模組的讀寫請求設定優先序，防止低優先度任務影響關鍵路徑。', engineeringMeaning: 'QoS 是 DDR 頻寬競爭的仲裁機制；設定不當時，Cockpit 媒體任務可能搶占 ADAS 推論的頻寬，導致 AI 延遲超標。', commonMisunderstanding: '以為 QoS 是網路協定的概念，不屬於嵌入式系統。實際上 SoC 內部 DDR 仲裁是 QoS 的核心應用場景之一。', relatedChapters: ['3.4', '5.1'], relatedModules: ['ddr', 'soc', 'npu'] },
  { id: 'frame-sync', term: 'Frame Sync', category: '影像系統', definition: '多路攝影機幀同步機制，確保各路攝影機在相同時刻完成曝光，產生時間對齊的影像幀。', engineeringMeaning: '360° 環視、立體視覺等需要多路影像融合的功能，都依賴 Frame Sync；時序不同步會導致拼接誤差或 AI 融合結果不準確。', commonMisunderstanding: '以為攝影機只要同時接上去就會自動同步。實際上多路攝影機的 Frame Sync 需要明確的硬體觸發設計，軟體層面的同步精度通常不夠。', relatedChapters: ['4.6'], relatedModules: ['camera', 'isp', 'sensor-fusion'] },
  { id: 'timestamp', term: 'Timestamp', category: '影像系統', definition: '感測器資料的時間標記，記錄資料採集的精確時刻，用於多感測器融合時的時序對齊。', engineeringMeaning: '感測器融合的核心前提是各感測器的 Timestamp 必須對齊到同一個時間基準；Timestamp 不準確會導致融合結果中的空間誤差。', commonMisunderstanding: '以為 Timestamp 只是記錄「什麼時候拍的」，不影響功能。對 Sensor Fusion 而言，Timestamp 精度直接影響定位和感知的準確率。', relatedChapters: ['4.6'], relatedModules: ['camera', 'sensor-fusion'] },
  { id: 'encoder-term', term: 'Encoder', category: '影像系統', definition: '影像編碼器，將 YUV 原始影像壓縮為 H.264 / H.265 等標準格式，大幅減少儲存與傳輸所需的資料量。', engineeringMeaning: 'H.265 壓縮效率比 H.264 高約 50%，但算力需求約高 2 倍（需依實際平台確認）；選擇編碼格式需要在壓縮率、算力消耗與解碼相容性之間取捨。', commonMisunderstanding: '以為影像壓縮只是儲存問題。車載系統中，Encoder 同時消耗 DDR BW 與 SoC 硬體算力，是系統資源競爭的參與者。', relatedChapters: ['3.3', '4.3'], relatedModules: ['encoder', 'ddr', 'storage'] },
  { id: 'decoder-term', term: 'Decoder', category: '影像系統', definition: '影像解碼器，將 H.264/H.265 壓縮影片還原為 YUV 格式供播放或 AI 後分析使用。', engineeringMeaning: '解碼器通常是硬體加速模組（硬解），軟解 CPU 消耗過高；多路同時解碼時也會消耗 DDR BW。', commonMisunderstanding: '以為解碼只是播放功能，不需要特別設計。車載 AI 的事件後分析需要高效能解碼器，是選型時需考慮的系統需求。', relatedChapters: ['3.3'], relatedModules: ['decoder', 'ddr', 'display'] },
  { id: 'emmc', term: 'eMMC', category: '儲存系統', definition: 'Embedded MultiMediaCard，嵌入式 NAND Flash 儲存方案，常見於中低階車載系統。', engineeringMeaning: '成本低，整合度高；但 I/O 速度低於 UFS，且 Write Endurance（TBW）是長期可靠性設計的重要考量（需依具體型號填入）。', commonMisunderstanding: '以為 eMMC 和手機用的差不多。車規 eMMC 需符合 AEC-Q100 標準，工作溫度範圍更寬，壽命要求更長。', relatedChapters: ['3.7', '6.5'], relatedModules: ['storage'] },
  { id: 'ufs', term: 'UFS', category: '儲存系統', definition: 'Universal Flash Storage，比 eMMC 提供更高 I/O 速度的嵌入式儲存方案，適合需要高速讀寫的車載應用。', engineeringMeaning: 'UFS 支援全雙工讀寫，I/O 速度顯著高於 eMMC；適合高解析度多路錄影或需要快速 OTA 更新的應用（需依具體規格確認速度數字）。', commonMisunderstanding: '以為 UFS 只是更快的 eMMC。UFS 的全雙工架構從根本上改變了讀寫的並行能力，不只是速度提升。', relatedChapters: ['3.7'], relatedModules: ['storage'] },
